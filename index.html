:root{
  --bg:#f7f6f3;--bg2:#ffffff;--bg3:#eeecea;--bg4:#e5e3df;
  --txt:#1c1b19;--txt2:#6b6966;--txt3:#9c9895;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --acc:#6c3fc5;--acc2:#f0eaff;
  --r:8px;--rl:12px;--rx:18px;
  --font:'DM Sans',system-ui,sans-serif;
  --red-bg:#fdecea;--red:#c0392b;
  --yellow-bg:#fef9e7;--yellow:#8a6d00;
  --green-bg:#eaf5ea;--green:#276227;
  --shadow:0 2px 16px rgba(0,0,0,0.07);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.13);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;flex-direction:column;transition:background .3s,color .3s}

/* ‚îÄ‚îÄ TOP NAV ‚îÄ‚îÄ */
#topnav{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);height:50px;flex-shrink:0;position:relative;z-index:10;transition:background .3s}
#nav-brand{font-size:15px;font-weight:600;color:var(--txt);padding:0 20px;white-space:nowrap;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:8px}
#nav-tabs{display:flex;flex:1;height:100%;padding:0 8px}
.nav-tab{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;border:none;background:none;font-family:var(--font);height:100%;border-bottom:2px solid transparent;transition:color .15s;white-space:nowrap}
.nav-tab:hover{color:var(--txt)}
.nav-tab.active{color:var(--txt);border-bottom-color:var(--acc)}
#nav-right{display:flex;align-items:center;gap:8px;padding:0 16px;margin-left:auto}
#search-wrap{position:relative}
#search-input{width:190px;height:32px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--txt);font-size:12px;font-family:var(--font);padding:0 12px 0 32px;transition:width .2s,box-shadow .2s}
#search-input:focus{outline:none;box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 25%,transparent);width:250px}
#search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--txt3);pointer-events:none}
#add-hw-btn{height:32px;padding:0 14px;border-radius:20px;background:var(--acc);color:#fff;border:none;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:opacity .15s}
#add-hw-btn:hover{opacity:.85}
#theme-btn{height:32px;width:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0}
#theme-btn:hover{background:var(--bg4)}

/* ‚îÄ‚îÄ LAYOUT ‚îÄ‚îÄ */
#layout{display:flex;flex:1;overflow:hidden}

/* ‚îÄ‚îÄ SIDEBAR ‚îÄ‚îÄ */
#sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background .3s}
#sidebar-top{padding:16px 12px 8px;font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase}
#subject-list{flex:1;overflow-y:auto;padding:0 8px}
.subj-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:1px;transition:background .12s;user-select:none}
.subj-item:hover{background:rgba(0,0,0,0.06)}
.subj-item.active{background:rgba(0,0,0,0.1)}
.subj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.subj-name{font-size:13px;color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subj-count{font-size:11px;color:var(--txt2)}
.subj-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s}
.subj-item:hover .subj-actions{opacity:1}
.subj-act-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--txt3);padding:2px 4px;border-radius:4px;font-family:var(--font);line-height:1}
.subj-act-btn:hover{color:var(--txt);background:var(--bg3)}
#sidebar-bottom{padding:10px 12px 16px}
#add-subj-btn{width:100%;padding:8px 10px;border:1px dashed var(--border2);border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--txt2);background:none;text-align:left;font-family:var(--font);transition:background .12s}
#add-subj-btn:hover{background:rgba(0,0,0,0.05)}

/* ‚îÄ‚îÄ MAIN ‚îÄ‚îÄ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#hw-panel{display:flex;flex-direction:column;flex:1;overflow:hidden}
#content-area{flex:1;overflow-y:auto;padding:20px 24px}

.section-hd{display:flex;align-items:center;gap:8px;margin:20px 0 10px}
.section-hd:first-child{margin-top:0}
.section-hd-label{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.07em;text-transform:uppercase}
.section-hd-line{flex:1;height:1px;background:var(--border)}
.section-hd-count{font-size:11px;color:var(--txt3)}

/* ‚îÄ‚îÄ TASK CARD ‚îÄ‚îÄ */
.hw-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:box-shadow .15s}
.hw-card:hover{box-shadow:var(--shadow)}
.hw-card.overdue-card{border-left:3px solid var(--red)}
.hw-card.assessment-card{border-left:3px solid var(--acc)}
.hw-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.hw-check:hover{border-color:var(--txt2)}
.hw-check.checked{background:#3a8a3e;border-color:#3a8a3e}
.hw-check.checked::after{content:'';display:block;width:4px;height:7px;border:1.5px solid #fff;border-left:none;border-top:none;transform:rotate(40deg) translateY(-1px)}
.hw-body{flex:1;min-width:0}
.hw-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hw-title{font-size:14px;color:var(--txt);font-weight:500;line-height:1.3}
.hw-title.done{text-decoration:line-through;color:var(--txt3)}
.hw-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s;flex-shrink:0}
.hw-card:hover .hw-actions{opacity:1}
.hw-act{background:none;border:none;cursor:pointer;font-size:14px;padding:3px 6px;color:var(--txt2);border-radius:5px;font-family:var(--font)}
.hw-act:hover{background:var(--bg3);color:var(--txt)}
.hw-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.hw-subj-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.hw-due-badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;white-space:nowrap}
.due-green{background:var(--green-bg);color:var(--green)}
.due-yellow{background:var(--yellow-bg);color:var(--yellow)}
.due-red{background:var(--red-bg);color:var(--red)}
.hw-date-txt{font-size:11px;color:var(--txt3)}
.hw-smart{font-size:11px;color:var(--acc);background:var(--acc2);padding:2px 8px;border-radius:6px}
.hw-completed-at{font-size:11px;color:var(--txt3);font-style:italic}
.assess-badge{font-size:11px;background:var(--acc2);color:var(--acc);padding:2px 8px;border-radius:6px;font-weight:500}
.grade-badge{font-size:12px;font-weight:600;padding:2px 10px;border-radius:6px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--txt2)}
.empty-state .e-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state .e-title{font-size:15px;font-weight:500;margin-bottom:6px}
.empty-state .e-sub{font-size:13px;color:var(--txt3)}
.hl{background:#fff176;color:#000;border-radius:2px;padding:0 1px}

/* ‚îÄ‚îÄ AVERAGES PANEL ‚îÄ‚îÄ */
#avg-panel{display:none;flex:1;overflow-y:auto;padding:24px}
#avg-panel.visible{display:block}
.avg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.avg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px;transition:box-shadow .15s}
.avg-card:hover{box-shadow:var(--shadow)}
.avg-card-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.avg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.avg-subj-name{font-size:15px;font-weight:600;color:var(--txt)}
.avg-count{font-size:12px;color:var(--txt3);margin-left:auto}
.avg-score-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:12px}
.avg-score{font-size:42px;font-weight:700;line-height:1}
.avg-score-pct{font-size:18px;color:var(--txt2);margin-bottom:6px}
.avg-grade-lbl{font-size:13px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:6px}
.avg-bar-wrap{background:var(--bg3);border-radius:20px;height:8px;overflow:hidden;margin-bottom:14px}
.avg-bar{height:100%;border-radius:20px;transition:width .6s ease}
.avg-history{border-top:1px solid var(--border);padding-top:12px}
.avg-history-title{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.avg-hist-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.avg-hist-row:last-child{border-bottom:none}
.avg-hist-name{font-size:12px;color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.avg-hist-score{font-size:12px;font-weight:600}
.avg-hist-date{font-size:11px;color:var(--txt3)}
.avg-no-data{text-align:center;padding:40px 20px;color:var(--txt3);font-size:13px}

/* ‚îÄ‚îÄ CALENDAR ‚îÄ‚îÄ */
#cal-panel{display:none;flex-direction:column;flex:1;overflow:hidden}
#cal-panel.visible{display:flex}
#cal-header{display:flex;align-items:center;gap:10px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
#cal-month-lbl{font-size:16px;font-weight:600;flex:1;text-align:center}
.cal-nav-btn{background:none;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--txt);transition:background .12s;font-family:var(--font)}
.cal-nav-btn:hover{background:var(--bg3)}
#cal-today-btn{font-size:12px;padding:0 12px;height:32px;border-radius:var(--r);border:1px solid var(--border2);background:none;color:var(--txt);cursor:pointer;font-family:var(--font);transition:background .12s}
#cal-today-btn:hover{background:var(--bg3)}
#cal-add-event-btn{font-size:12px;padding:0 14px;height:32px;border-radius:var(--r);background:var(--acc);color:#fff;border:none;cursor:pointer;font-family:var(--font);font-weight:500;transition:opacity .15s}
#cal-add-event-btn:hover{opacity:.85}
#cal-body{display:flex;flex:1;overflow:hidden}
#cal-grid-wrap{flex:1;overflow-y:auto;padding:16px}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-dow{font-size:11px;font-weight:600;color:var(--txt3);text-align:center;padding:4px 0;letter-spacing:.04em;text-transform:uppercase}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{min-height:88px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);padding:6px;cursor:pointer;transition:background .12s,box-shadow .12s}
.cal-day:hover{background:var(--bg3)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cal-day.today{border-color:var(--acc);border-width:1.5px}
.cal-day.selected{background:var(--bg3)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--txt3);margin-bottom:4px;display:flex}
.cal-day.today .cal-day-num .ni{background:var(--acc);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-pill{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;display:block;line-height:1.4}
.cal-more{font-size:10px;color:var(--txt3);margin-top:2px}
#cal-side{width:280px;min-width:280px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
#cal-side-hd{padding:14px 16px 10px;font-size:13px;font-weight:600;color:var(--txt);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#cal-side-hd span{font-size:12px;font-weight:400;color:var(--txt3)}
#cal-side-events{flex:1;overflow-y:auto;padding:12px 16px}
.cal-ev-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.cal-ev-row:last-child{border-bottom:none}
.cal-ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.cal-ev-body{flex:1;min-width:0}
.cal-ev-name{font-size:13px;color:var(--txt);font-weight:500}
.cal-ev-type{font-size:11px;color:var(--txt3);margin-top:2px}
.cal-ev-del{background:none;border:none;cursor:pointer;font-size:13px;color:var(--txt3);padding:2px 4px;border-radius:4px;font-family:var(--font);flex-shrink:0}
.cal-ev-del:hover{background:var(--red-bg);color:var(--red)}

/* ‚îÄ‚îÄ MODAL ‚îÄ‚îÄ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border-radius:var(--rx);padding:28px;width:440px;max-width:calc(100vw - 32px);border:1px solid var(--border2);box-shadow:var(--shadow-lg);max-height:calc(100vh - 60px);overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--txt)}
.modal-field{margin-bottom:14px}
.modal-label{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px}
.modal-input{width:100%;font-size:14px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--txt);font-family:var(--font);transition:border-color .15s,box-shadow .15s}
.modal-input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 15%,transparent)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-check-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.modal-check-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--acc)}
.modal-check-row label{font-size:13px;color:var(--txt);cursor:pointer}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.modal-btn{font-size:13px;font-weight:500;padding:9px 20px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--txt);font-family:var(--font);transition:background .12s}
.modal-btn:hover{background:var(--bg4)}
.modal-btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.modal-btn.primary:hover{opacity:.87}
.modal-btn.danger{background:var(--red-bg);color:var(--red);border-color:transparent}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{border-color:var(--txt)}

/* ‚îÄ‚îÄ GRADE MODAL ‚îÄ‚îÄ */
.grade-input-big{font-size:48px;font-weight:700;text-align:center;width:100%;padding:12px;border:2px solid var(--border2);border-radius:var(--rl);background:var(--bg3);color:var(--txt);font-family:var(--font)}
.grade-input-big:focus{outline:none;border-color:var(--acc)}
.grade-preview{text-align:center;font-size:22px;font-weight:700;padding:8px;border-radius:var(--r);margin-top:8px;transition:background .2s,color .2s}

/* ‚îÄ‚îÄ THEME MODAL ‚îÄ‚îÄ */
.theme-modal-body{display:flex;flex-direction:column;gap:20px}
.theme-section-label{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}

/* Preset swatches */
.preset-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.preset-card{border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;position:relative}
.preset-card:hover{transform:scale(1.04)}
.preset-card.active{border-color:var(--acc)}
.preset-card.active::after{content:'‚úì';position:absolute;top:3px;right:5px;font-size:10px;font-weight:700;color:var(--acc)}
.preset-preview{height:36px;display:flex}
.pp-s{width:30%}
.pp-m{flex:1;display:flex;flex-direction:column;padding:4px;gap:2px}
.pp-bar{height:3px;border-radius:2px;opacity:.7}
.preset-name{font-size:10px;font-weight:500;text-align:center;padding:4px 2px;background:var(--bg3);color:var(--txt2)}

/* Spectrum picker */
.spectrum-wrap{display:flex;flex-direction:column;gap:10px}
.spectrum-row{display:flex;align-items:center;gap:12px}
.spectrum-label{font-size:12px;color:var(--txt2);width:80px;flex-shrink:0}
.spectrum-track{flex:1;height:14px;border-radius:7px;position:relative;cursor:pointer}
.spectrum-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.25);position:absolute;top:50%;transform:translate(-50%,-50%);cursor:grab;transition:box-shadow .15s}
.spectrum-thumb:active{cursor:grabbing;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.spectrum-preview-box{width:100%;height:100px;border-radius:var(--rl);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-top:4px;font-size:13px;color:var(--txt2);transition:background .2s;flex-direction:column;gap:6px}
.spv-swatch-row{display:flex;gap:8px}
.spv-swatch{width:28px;height:28px;border-radius:6px}

/* ‚îÄ‚îÄ ADD DRAWER ‚îÄ‚îÄ */
#add-drawer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border2);padding:20px 24px 28px;z-index:200;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.1)}
#add-drawer.open{transform:translateY(0)}
#drawer-title{font-size:15px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
#drawer-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt3);padding:0 4px;font-family:var(--font)}
#drawer-close:hover{color:var(--txt)}
#drawer-grid{display:grid;grid-template-columns:1fr 180px 180px auto;gap:12px;align-items:end}
.drawer-label{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px}
.drawer-input{width:100%;font-size:13px;padding:9px 12px;height:38px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--txt);font-family:var(--font);transition:border-color .15s,box-shadow .15s}
.drawer-input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 15%,transparent)}
#drawer-assess-row{display:flex;align-items:center;gap:6px;height:38px}
#drawer-assess-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--acc);cursor:pointer}
#drawer-assess-row label{font-size:13px;color:var(--txt);cursor:pointer;white-space:nowrap}
#drawer-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.d-btn{height:36px;padding:0 16px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);border:1px solid var(--border2);background:var(--bg3);color:var(--txt);transition:background .12s}
.d-btn:hover{background:var(--bg4)}
.d-btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.d-btn.primary:hover{opacity:.87}

/* ‚îÄ‚îÄ TOAST / NOTIF ‚îÄ‚îÄ */
#toast{position:fixed;bottom:28px;right:28px;background:var(--txt);color:var(--bg2);font-size:12px;font-family:var(--font);font-weight:500;padding:8px 16px;border-radius:20px;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .2s,transform .2s;z-index:999}
#toast.show{opacity:1;transform:translateY(0)}
#notif-banner{display:none;background:var(--acc2);border-bottom:1px solid rgba(108,63,197,.2);padding:8px 24px;font-size:12px;color:var(--acc);font-weight:500;align-items:center;gap:8px;flex-shrink:0}
#notif-banner.show{display:flex}

<script>
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  STORAGE
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
const _mem={};
function lsOk(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true}catch{return false}}
const LS=lsOk();
function load(k,def){try{const r=LS?localStorage.getItem(k):_mem[k];return r!=null?JSON.parse(r):def}catch{return def}}
function store(k,v){try{const s=JSON.stringify(v);LS?localStorage.setItem(k,s):(_mem[k]=s)}catch{}}

const SUBJ_COLORS=['#e05c5c','#e07c3a','#d4a820','#5aac50','#3aabab','#5c7be0','#9b5ce0','#e05ca0','#6b7280'];
const DEFAULT_SUBJECTS=[{id:'s1',name:'Maths',color:'#5c7be0'},{id:'s2',name:'English',color:'#5aac50'},{id:'s3',name:'Science',color:'#3aabab'}];

let subjects  = load('hw_subjects',   DEFAULT_SUBJECTS);
let tasks     = load('hw_tasks',      []);
let calEvents = load('hw_cal_events', []);
// theme stored as {preset, h, s, l, dark}
let themeStore = load('hw_theme2', {preset:'warm', h:260, s:60, l:50, dark:false});

function saveAll(){store('hw_subjects',subjects);store('hw_tasks',tasks);store('hw_cal_events',calEvents);showToast('‚úì Saved')}
function saveTheme(){store('hw_theme2',themeStore)}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  STATE
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
let activeSubject='all', activeTab='all', searchQ='';
let calYear, calMonth, selectedCalDay=null;
const _n=new Date(); calYear=_n.getFullYear(); calMonth=_n.getMonth();

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  UTILS
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function todayStr(){return new Date().toISOString().slice(0,10)}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)}
function daysUntil(due){return Math.round((new Date(due)-new Date(todayStr()))/864e5)}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtShort(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'})}
function fmtLong(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function hexRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function timeAgo(ds){const d=daysUntil(ds);if(d===0)return'today';if(d===-1)return'yesterday';if(d<0)return`${Math.abs(d)} days ago`;return''}
function dueInfo(due){
  const d=daysUntil(due);
  if(d<0)  return{text:'Overdue',cls:'due-red'};
  if(d===0)return{text:'Due today',cls:'due-red'};
  if(d===1)return{text:'Due tomorrow',cls:'due-yellow'};
  if(d<=3) return{text:`Due in ${d} days`,cls:'due-yellow'};
  return       {text:`Due in ${d} days`,cls:'due-green'};
}
function highlight(text,q){
  if(!q)return escH(text);
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return escH(text).replace(re,'<mark class="hl">$1</mark>');
}
function gradeInfo(pct){
  if(pct>=90)return{label:'A+',bg:'#e8f5e9',color:'#1b5e20'};
  if(pct>=80)return{label:'A', bg:'#e8f5e9',color:'#2e7d32'};
  if(pct>=70)return{label:'B', bg:'#e8f5e9',color:'#388e3c'};
  if(pct>=60)return{label:'C', bg:'#fef9e7',color:'#8a6d00'};
  if(pct>=50)return{label:'D', bg:'#fef9e7',color:'#a05000'};
  return             {label:'F', bg:'#fdecea',color:'#c0392b'};
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  TOAST
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
let _tt=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove('show'),1600);
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  THEME ENGINE
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
const PRESETS=[
  {id:'warm',    name:'Warm',     bg:'#f7f6f3', bg2:'#ffffff', bg3:'#eeecea', txt:'#1c1b19', h:260, s:60, l:50, dark:false},
  {id:'dark',    name:'Dark',     bg:'#141412', bg2:'#1e1d1b', bg3:'#252420', txt:'#f0ede8', h:260, s:55, l:65, dark:true},
  {id:'ocean',   name:'Ocean',    bg:'#e8f4f8', bg2:'#ffffff', bg3:'#d6ecf3', txt:'#0d2d3a', h:200, s:70, l:38, dark:false},
  {id:'deep',    name:'Deep Sea', bg:'#081e2a', bg2:'#0e2d3e', bg3:'#133549', txt:'#d0eaf5', h:195, s:80, l:55, dark:true},
  {id:'rose',    name:'Rose',     bg:'#fdf5f7', bg2:'#ffffff', bg3:'#f7e8ed', txt:'#2a0d17', h:345, s:65, l:48, dark:false},
  {id:'forest',  name:'Forest',   bg:'#f0f5ef', bg2:'#ffffff', bg3:'#e2ede0', txt:'#0e2010', h:125, s:55, l:35, dark:false},
  {id:'slate',   name:'Midnight', bg:'#1a1f2e', bg2:'#222736', bg3:'#2a3045', txt:'#e2e6f0', h:225, s:75, l:65, dark:true},
  {id:'peach',   name:'Peach',    bg:'#fff8f4', bg2:'#ffffff', bg3:'#ffeee6', txt:'#2d1000', h:22,  s:70, l:47, dark:false},
  {id:'mono',    name:'Mono',     bg:'#f8f8f8', bg2:'#ffffff', bg3:'#efefef', txt:'#111111', h:0,   s:0,  l:20, dark:false},
  {id:'lavender',name:'Lavender', bg:'#f5f3ff', bg2:'#ffffff', bg3:'#ede9fe', txt:'#1e1440', h:255, s:65, l:52, dark:false},
];

function hslToHex(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};
  return`#${f(0)}${f(8)}${f(4)}`;
}

function applyTheme(ts){
  // find preset for bg/txt colours
  const p=PRESETS.find(x=>x.id===ts.preset)||PRESETS[0];
  const acc=hslToHex(ts.h, ts.s, ts.dark? Math.min(ts.l+15,85) : ts.l);
  const accLight=hslToHex(ts.h, Math.max(ts.s-20,10), ts.dark? Math.max(ts.l-20,20) : Math.min(ts.l+35,95));
  const r=document.documentElement;
  r.style.setProperty('--bg',     p.bg);
  r.style.setProperty('--bg2',    p.bg2);
  r.style.setProperty('--bg3',    p.bg3);
  r.style.setProperty('--bg4',    p.dark? lightenDarken(p.bg3,-10) : lightenDarken(p.bg3,-5));
  r.style.setProperty('--txt',    p.txt);
  r.style.setProperty('--txt2',   p.dark? '#8a8784':'#6b6966');
  r.style.setProperty('--txt3',   p.dark? '#5a5855':'#9c9895');
  r.style.setProperty('--border', p.dark? 'rgba(255,255,255,0.09)':'rgba(0,0,0,0.09)');
  r.style.setProperty('--border2',p.dark? 'rgba(255,255,255,0.16)':'rgba(0,0,0,0.16)');
  r.style.setProperty('--acc',    acc);
  r.style.setProperty('--acc2',   accLight+'33');
  r.style.setProperty('--shadow', p.dark? '0 2px 16px rgba(0,0,0,.3)':'0 2px 16px rgba(0,0,0,.07)');
  r.style.setProperty('--shadow-lg', p.dark? '0 8px 40px rgba(0,0,0,.45)':'0 8px 40px rgba(0,0,0,.13)');
  if(p.dark){
    r.style.setProperty('--red-bg','#2d1515');r.style.setProperty('--red','#e07070');
    r.style.setProperty('--yellow-bg','#2a2310');r.style.setProperty('--yellow','#d4a830');
    r.style.setProperty('--green-bg','#0f2410');r.style.setProperty('--green','#6abf6a');
  }else{
    r.style.setProperty('--red-bg','#fdecea');r.style.setProperty('--red','#c0392b');
    r.style.setProperty('--yellow-bg','#fef9e7');r.style.setProperty('--yellow','#8a6d00');
    r.style.setProperty('--green-bg','#eaf5ea');r.style.setProperty('--green','#276227');
  }
}

function lightenDarken(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.max(0,r+amt));g=Math.min(255,Math.max(0,g+amt));b=Math.min(255,Math.max(0,b+amt));
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

applyTheme(themeStore);

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  THEME PICKER
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function openThemePicker(){
  let ts={...themeStore};

  function previewHex(){return hslToHex(ts.h,ts.s,ts.dark?Math.min(ts.l+15,85):ts.l)}
  function previewAccLight(){return hslToHex(ts.h,Math.max(ts.s-20,10),ts.dark?Math.max(ts.l-20,20):Math.min(ts.l+35,95))}

  const presetCards=PRESETS.map(p=>`
    <div class="preset-card${p.id===ts.preset?' active':''}" data-pid="${p.id}"
      style="--pp-s:${p.bg3};--pp-m:${p.bg};--pp-a:${hslToHex(p.h,p.s,p.dark?Math.min(p.l+15,85):p.l)};--pp-t:${p.txt}">
      <div class="preset-preview">
        <div class="pp-s" style="background:var(--pp-s)"></div>
        <div class="pp-m" style="background:var(--pp-m)">
          <div class="pp-bar" style="background:var(--pp-a);width:70%"></div>
          <div class="pp-bar" style="background:var(--pp-t);width:90%"></div>
          <div class="pp-bar" style="background:var(--pp-t);width:60%"></div>
        </div>
      </div>
      <div class="preset-name">${p.name}</div>
    </div>`).join('');

  showModal(`
    <div class="modal-title">üé® Colour Scheme</div>
    <div class="theme-modal-body">
      <div>
        <div class="theme-section-label">Base Theme</div>
        <div class="preset-grid" id="preset-grid">${presetCards}</div>
      </div>
      <div>
        <div class="theme-section-label">Accent Colour</div>
        <div class="spectrum-wrap">
          <div class="spectrum-row">
            <span class="spectrum-label">Hue</span>
            <div class="spectrum-track" id="hue-track"
              style="background:linear-gradient(to right,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000)">
              <div class="spectrum-thumb" id="hue-thumb"></div>
            </div>
          </div>
          <div class="spectrum-row">
            <span class="spectrum-label">Saturation</span>
            <div class="spectrum-track" id="sat-track" style="background:linear-gradient(to right,#888,#888)">
              <div class="spectrum-thumb" id="sat-thumb"></div>
            </div>
          </div>
          <div class="spectrum-row">
            <span class="spectrum-label">Lightness</span>
            <div class="spectrum-track" id="lit-track" style="background:linear-gradient(to right,#000,#888,#fff)">
              <div class="spectrum-thumb" id="lit-thumb"></div>
            </div>
          </div>
          <div class="spectrum-preview-box" id="spv-box">
            <div class="spv-swatch-row" id="spv-swatches"></div>
            <div id="spv-label" style="font-size:12px;opacity:.7"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn" id="th-cancel">Cancel</button>
      <button class="modal-btn primary" id="th-apply">Apply</button>
    </div>`);

  function updateSliderBgs(){
    const accHex=hslToHex(ts.h,ts.s,50);
    document.getElementById('sat-track').style.background=`linear-gradient(to right,${hslToHex(ts.h,0,50)},${hslToHex(ts.h,100,50)})`;
    document.getElementById('lit-track').style.background=`linear-gradient(to right,${hslToHex(ts.h,ts.s,0)},${hslToHex(ts.h,ts.s,50)},${hslToHex(ts.h,ts.s,100)})`;
  }

  function positionThumbs(){
    document.getElementById('hue-thumb').style.left=(ts.h/360*100)+'%';
    document.getElementById('sat-thumb').style.left=(ts.s)+'%';
    document.getElementById('lit-thumb').style.left=(ts.l)+'%';
  }

  function updatePreview(){
    const acc=previewHex();
    const accL=previewAccLight();
    const spv=document.getElementById('spv-box');
    spv.style.background=accL+'22';
    document.getElementById('spv-swatches').innerHTML=
      `<div class="spv-swatch" style="background:${acc}"></div>
       <div class="spv-swatch" style="background:${accL}44;border:2px solid ${acc}44"></div>
       <div class="spv-swatch" style="background:${acc}33;border-radius:50%"></div>`;
    document.getElementById('spv-label').textContent=`${acc.toUpperCase()}  ‚Ä¢  H:${ts.h}¬∞ S:${ts.s}% L:${ts.l}%`;
    updateSliderBgs();
    positionThumbs();
    // live preview on page
    applyTheme(ts);
  }

  function makeDraggable(trackId, thumbId, onVal){
    const track=document.getElementById(trackId);
    const thumb=document.getElementById(thumbId);
    function setFromEvent(e){
      const rect=track.getBoundingClientRect();
      const cx=(e.touches?e.touches[0].clientX:e.clientX);
      let pct=Math.min(1,Math.max(0,(cx-rect.left)/rect.width));
      onVal(pct);
      updatePreview();
    }
    thumb.addEventListener('mousedown',e=>{
      e.preventDefault();
      const mm=ev=>setFromEvent(ev);
      const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
      document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    });
    track.addEventListener('click',setFromEvent);
    thumb.addEventListener('touchstart',e=>{
      const tm=ev=>{e.preventDefault();setFromEvent(ev)};
      const tu=()=>{document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',tu)};
      document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',tu);
    });
  }

  makeDraggable('hue-track','hue-thumb',p=>{ts.h=Math.round(p*360)});
  makeDraggable('sat-track','sat-thumb',p=>{ts.s=Math.round(p*100)});
  makeDraggable('lit-track','lit-thumb',p=>{ts.l=Math.round(p*100)});

  document.querySelectorAll('.preset-card').forEach(el=>{
    el.addEventListener('click',()=>{
      ts.preset=el.dataset.pid;
      const p=PRESETS.find(x=>x.id===ts.preset);
      ts.h=p.h;ts.s=p.s;ts.l=p.l;ts.dark=p.dark;
      document.querySelectorAll('.preset-card').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      updatePreview();
    });
  });

  updatePreview();

  document.getElementById('th-cancel').onclick=()=>{applyTheme(themeStore);closeModal();};
  document.getElementById('th-apply').onclick=()=>{themeStore={...ts};saveTheme();applyTheme(themeStore);closeModal();showToast('‚úì Theme saved');};
}

//  TASKS
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function sorted(arr){return[...arr].sort((a,b)=>a.dueDate<b.dueDate?-1:a.dueDate>b.dueDate?1:0)}

function filterTasks(){
  let t=tasks;
  if(activeSubject!=='all')t=t.filter(x=>x.subjectId===activeSubject);
  if(searchQ){const q=searchQ.toLowerCase();t=t.filter(x=>x.title.toLowerCase().includes(q));}
  if(activeTab==='completed')return sorted(t.filter(x=>x.done));
  if(activeTab==='today')return sorted(t.filter(x=>!x.done&&(x.dueDate===todayStr()||x.dueDate===tomorrowStr())));
  return sorted(t.filter(x=>!x.done));
}

function taskCard(t){
  const subj=subjects.find(s=>s.id===t.subjectId)||{name:'?',color:'#9c9895'};
  const due=dueInfo(t.dueDate);
  const smart=!t.done&&daysUntil(t.dueDate)>=2&&daysUntil(t.dueDate)<=4;
  const isOv=!t.done&&daysUntil(t.dueDate)<0;
  const bg=hexRgba(subj.color,.14);
  const compAt=t.done&&t.completedAt?`Completed ${timeAgo(t.completedAt)||fmtShort(t.completedAt)}`:'';
  const gi = (t.done && t.grade!=null) ? gradeInfo(t.grade) : null;
  return `<div class="hw-card${isOv?' overdue-card':''}${t.isAssessment?' assessment-card':''}">
    <div class="hw-check${t.done?' checked':''}" data-chk="${t.id}"></div>
    <div class="hw-body">
      <div class="hw-top">
        <div class="hw-title${t.done?' done':''}">${t.isAssessment?'‚öÝÔ∏è ':''}${highlight(t.title,searchQ)}</div>
        <div class="hw-actions">
          <button class="hw-act" data-edit="${t.id}">‚úé</button>
          <button class="hw-act" data-rm="${t.id}">‚úï</button>
        </div>
      </div>
      <div class="hw-meta">
        <span class="hw-subj-tag" style="background:${bg};color:${subj.color}">${escH(subj.name)}</span>
        ${!t.done?`<span class="hw-due-badge ${due.cls}">${due.text}</span>`:''}
        ${t.isAssessment?'<span class="assess-badge">üìÑ Assessment</span>':''}
        <span class="hw-date-txt">${fmtShort(t.dueDate)}</span>
        ${smart?'<span class="hw-smart">‚ú¶ Start today</span>':''}
        ${compAt?`<span class="hw-completed-at">${compAt}</span>`:''}
        ${gi?`<span class="grade-badge" style="background:${gi.bg};color:${gi.color}">${t.grade}% ¬∑ ${gi.label}</span>`:''}
      </div>
    </div>
  </div>`;
}

function section(label,count,html){
  return`<div class="section-hd"><span class="section-hd-label">${label}</span><div class="section-hd-line"></div><span class="section-hd-count">${count}</span></div>${html}`;
}

function renderContent(){
  const area=document.getElementById('content-area');
  const f=filterTasks();
  if(activeTab==='all'){
    const ov=f.filter(t=>daysUntil(t.dueDate)<0);
    const ug=f.filter(t=>t.dueDate===todayStr()||t.dueDate===tomorrowStr());
    const wk=f.filter(t=>daysUntil(t.dueDate)>1&&daysUntil(t.dueDate)<=7);
    const lt=f.filter(t=>daysUntil(t.dueDate)>7);
    if(!f.length){area.innerHTML=`<div class="empty-state"><div class="e-icon">üì≠</div><div class="e-title">${searchQ?'No tasks match':'No tasks yet'}</div><div class="e-sub">${searchQ?'Try a different term':'Click "+ Add Homework" to get started'}</div></div>`;bindCards();return;}
    let h='';
    if(ov.length)h+=section('üî¥ Overdue',ov.length,ov.map(taskCard).join(''));
    if(ug.length)h+=section('‚ö° Due Very Soon',ug.length,ug.map(taskCard).join(''));
    if(wk.length)h+=section('üìå This Week',wk.length,wk.map(taskCard).join(''));
    if(lt.length)h+=section('üìÜ Upcoming',lt.length,lt.map(taskCard).join(''));
    area.innerHTML=h;
  }else if(activeTab==='today'){
    if(!f.length){area.innerHTML=`<div class="empty-state"><div class="e-icon">üéâ</div><div class="e-title">All clear!</div><div class="e-sub">Nothing due today or tomorrow.</div></div>`;bindCards();return;}
    const td=f.filter(t=>t.dueDate===todayStr()),tm=f.filter(t=>t.dueDate===tomorrowStr());
    let h='';
    if(td.length)h+=section('Due Today',td.length,td.map(taskCard).join(''));
    if(tm.length)h+=section('Due Tomorrow',tm.length,tm.map(taskCard).join(''));
    area.innerHTML=h;
  }else{
    if(!f.length){area.innerHTML=`<div class="empty-state"><div class="e-icon">‚úÖ</div><div class="e-title">Nothing completed yet</div><div class="e-sub">Ticked tasks appear here.</div></div>`;bindCards();return;}
    area.innerHTML=section('Completed',f.length,f.map(taskCard).join(''));
  }
  bindCards();
}

function bindCards(){
  const area=document.getElementById('content-area');
  area.querySelectorAll('[data-chk]').forEach(el=>el.addEventListener('click',()=>{
    const t=tasks.find(x=>x.id===el.dataset.chk);
    if(!t)return;
    if(!t.done){
      // marking as done
      if(t.isAssessment){
        // ask for grade
        askForGrade(t);
      }else{
        t.done=true;t.completedAt=todayStr();saveAll();renderAll();
      }
    }else{
      t.done=false;delete t.completedAt;delete t.grade;saveAll();renderAll();
    }
  }));
  area.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click',()=>openEditModal(el.dataset.edit)));
  area.querySelectorAll('[data-rm]').forEach(el=>el.addEventListener('click',()=>{tasks=tasks.filter(x=>x.id!==el.dataset.rm);saveAll();renderAll();}));
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  GRADE PROMPT
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function askForGrade(t){
  const subj=subjects.find(s=>s.id===t.subjectId)||{name:'?'};
  showModal(`
    <div class="modal-title">‚úÖ Assessment Complete!</div>
    <p style="font-size:13px;color:var(--txt2);margin-bottom:16px">
      <strong>${escH(t.title)}</strong> ‚Äî ${escH(subj.name)}<br>
      What percentage did you get? (Leave blank to skip)
    </p>
    <div class="modal-field">
      <label class="modal-label">Score (%)</label>
      <input class="modal-input grade-input-big" type="number" id="grade-in" min="0" max="100" placeholder="e.g. 84"/>
      <div class="grade-preview" id="grade-preview"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn" id="g-skip">Skip</button>
      <button class="modal-btn primary" id="g-save">Save & Complete</button>
    </div>`);

  const inp=document.getElementById('grade-in');
  const prev=document.getElementById('grade-preview');
  inp.focus();

  inp.addEventListener('input',()=>{
    const v=parseInt(inp.value);
    if(isNaN(v)||v<0||v>100){prev.style.background='';prev.textContent='';return;}
    const gi=gradeInfo(v);
    prev.style.background=gi.bg;prev.style.color=gi.color;
    prev.textContent=`${v}% ‚Äî Grade ${gi.label}`;
  });

  function complete(grade){
    t.done=true;t.completedAt=todayStr();
    if(grade!=null)t.grade=grade;
    saveAll();closeModal();renderAll();
    // check if multiple assessments done for subject ‚Üí show average toast
    const doneAssess=tasks.filter(x=>x.subjectId===t.subjectId&&x.done&&x.isAssessment&&x.grade!=null);
    if(doneAssess.length>=2){
      const avg=Math.round(doneAssess.reduce((s,x)=>s+x.grade,0)/doneAssess.length);
      const gi=gradeInfo(avg);
      showToast(`üìä ${escH(subj.name)} avg: ${avg}% (${gi.label})`);
    }
  }

  document.getElementById('g-skip').onclick=()=>complete(null);
  document.getElementById('g-save').onclick=()=>{
    const v=parseInt(inp.value);
    complete(isNaN(v)||v<0||v>100?null:v);
  };
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('g-save').click();});
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  AVERAGES PANEL
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function renderAverages(){
  const panel=document.getElementById('avg-panel');
  const assessTasks=tasks.filter(t=>t.isAssessment&&t.done&&t.grade!=null);

  if(!assessTasks.length){
    panel.innerHTML=`<div class="empty-state"><div class="e-icon">üìä</div><div class="e-title">No graded assessments yet</div><div class="e-sub">Complete assessments and enter your score to see averages here.</div></div>`;
    return;
  }

  let html='<div class="avg-grid">';
  subjects.forEach(s=>{
    const done=assessTasks.filter(t=>t.subjectId===s.id);
    if(!done.length)return;
    const avg=Math.round(done.reduce((acc,t)=>acc+t.grade,0)/done.length);
    const gi=gradeInfo(avg);
    const barColor=avg>=70?'var(--green)':avg>=50?'var(--yellow)':'var(--red)';
    const histRows=done.slice().reverse().map(t=>`
      <div class="avg-hist-row">
        <span class="avg-hist-name">${escH(t.title)}</span>
        <span class="avg-hist-score" style="color:${gradeInfo(t.grade).color}">${t.grade}%</span>
        <span class="avg-hist-date">${fmtShort(t.dueDate)}</span>
      </div>`).join('');
    html+=`<div class="avg-card">
      <div class="avg-card-top">
        <div class="avg-dot" style="background:${s.color}"></div>
        <span class="avg-subj-name">${escH(s.name)}</span>
        <span class="avg-count">${done.length} assessment${done.length>1?'s':''}</span>
      </div>
      <div class="avg-score-row">
        <span class="avg-score" style="color:${gi.color}">${avg}</span>
        <span class="avg-score-pct">%</span>
        <span class="avg-grade-lbl" style="background:${gi.bg};color:${gi.color}">${gi.label}</span>
      </div>
      <div class="avg-bar-wrap"><div class="avg-bar" style="width:${avg}%;background:${barColor}"></div></div>
      <div class="avg-history">
        <div class="avg-history-title">Assessment history</div>
        ${histRows}
      </div>
    </div>`;
  });
  html+='</div>';
  panel.innerHTML=html;
}

//  ADD DRAWER
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function openDrawer(){
  document.getElementById('d-subj').innerHTML=subjects.map(s=>`<option value="${s.id}">${escH(s.name)}</option>`).join('');
  document.getElementById('d-title').value='';
  document.getElementById('d-date').value=todayStr();
  document.getElementById('d-assess').checked=false;
  document.getElementById('add-drawer').classList.add('open');
  setTimeout(()=>document.getElementById('d-title').focus(),50);
}
function closeDrawer(){document.getElementById('add-drawer').classList.remove('open');}

document.getElementById('add-hw-btn').onclick=openDrawer;
document.getElementById('drawer-close').onclick=closeDrawer;
document.getElementById('d-cancel').onclick=closeDrawer;
document.getElementById('d-title').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('d-submit').click();});
document.getElementById('d-submit').onclick=()=>{
  const title=document.getElementById('d-title').value.trim();
  const dueDate=document.getElementById('d-date').value;
  const subjectId=document.getElementById('d-subj').value;
  const isAssessment=document.getElementById('d-assess').checked;
  if(!title||!dueDate||!subjectId){showToast('‚öÝÔ∏è Please fill all fields');return;}
  tasks.push({id:'t'+uid(),title,dueDate,subjectId,isAssessment,done:false,created:todayStr()});
  saveAll();closeDrawer();renderAll();checkNotifications();showToast('‚úì Task added');
};

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  EDIT MODAL
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function openEditModal(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const opts=subjects.map(s=>`<option value="${s.id}"${s.id===t.subjectId?' selected':''}>${escH(s.name)}</option>`).join('');
  showModal(`<div class="modal-title">Edit Task</div>
    <div class="modal-field"><label class="modal-label">Title</label><input class="modal-input" type="text" id="et" value="${escH(t.title)}"/></div>
    <div class="modal-row">
      <div class="modal-field"><label class="modal-label">Due by</label><input class="modal-input" type="date" id="ed" value="${t.dueDate}"/></div>
      <div class="modal-field"><label class="modal-label">Subject</label><select class="modal-input" id="es">${opts}</select></div>
    </div>
    ${t.done&&t.isAssessment?`<div class="modal-field"><label class="modal-label">Grade (%)</label><input class="modal-input" type="number" id="eg" min="0" max="100" value="${t.grade??''}"/></div>`:''}
    <div class="modal-check-row"><input type="checkbox" id="ea" ${t.isAssessment?'checked':''}/><label for="ea">‚öÝÔ∏è Mark as Assessment</label></div>
    <div class="modal-btns"><button class="modal-btn" id="ec">Cancel</button><button class="modal-btn primary" id="es2">Save</button></div>`);
  document.getElementById('ec').onclick=closeModal;
  document.getElementById('et').focus();
  document.getElementById('es2').onclick=()=>{
    const title=document.getElementById('et').value.trim(),date=document.getElementById('ed').value,sid=document.getElementById('es').value,assess=document.getElementById('ea').checked;
    if(!title||!date)return;
    t.title=title;t.dueDate=date;t.subjectId=sid;t.isAssessment=assess;
    const eg=document.getElementById('eg');
    if(eg){const v=parseInt(eg.value);t.grade=isNaN(v)?undefined:v;}
    saveAll();closeModal();renderAll();
  };
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  CALENDAR
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function calDs(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function eventsForDay(ds){
  const hw=tasks.filter(t=>t.dueDate===ds).map(t=>({id:t.id,name:t.title,color:(subjects.find(s=>s.id===t.subjectId)||{color:'#9c9895'}).color,type:'hw',isAssessment:t.isAssessment,done:t.done}));
  const ce=calEvents.filter(e=>e.date===ds).map(e=>({id:e.id,name:e.title,color:e.color,type:'custom'}));
  return[...hw,...ce];
}

function renderCalendar(){
  const M=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-lbl').textContent=`${M[calMonth]} ${calYear}`;
  const first=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const td=todayStr();
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=calDs(calYear,calMonth,d);
    const evs=eventsForDay(ds);
    const pills=evs.slice(0,3).map(e=>`<span class="cal-pill" style="background:${hexRgba(e.color,.18)};color:${e.color}">${e.isAssessment?'‚öÝÔ∏è':''}${escH(e.name)}</span>`).join('');
    const more=evs.length>3?`<div class="cal-more">+${evs.length-3} more</div>`:'';
    html+=`<div class="cal-day${ds===td?' today':''}${ds===selectedCalDay?' selected':''}" data-date="${ds}">
      <div class="cal-day-num"><span class="ni">${d}</span></div>${pills}${more}</div>`;
  }
  document.getElementById('cal-days').innerHTML=html;
  document.querySelectorAll('.cal-day[data-date]').forEach(el=>el.addEventListener('click',()=>{selectedCalDay=el.dataset.date;renderCalendar();renderCalSide();}));
  if(selectedCalDay)renderCalSide();
}

function renderCalSide(){
  const evs=eventsForDay(selectedCalDay);
  document.getElementById('cal-side-title').textContent=fmtLong(selectedCalDay);
  document.getElementById('cal-side-count').textContent=evs.length?`${evs.length} event${evs.length>1?'s':''}`:' ';
  const c=document.getElementById('cal-side-events');
  if(!evs.length){c.innerHTML=`<div style="padding:20px 0;font-size:13px;color:var(--txt3);text-align:center">No events.<br><br><button class="modal-btn primary" onclick="openAddCalEventModal('${selectedCalDay}')" style="font-size:12px;padding:7px 14px">+ Add Event</button></div>`;return;}
  c.innerHTML=evs.map(e=>`<div class="cal-ev-row">
    <div class="cal-ev-dot" style="background:${e.color}"></div>
    <div class="cal-ev-body"><div class="cal-ev-name">${e.isAssessment?'‚öÝÔ∏è ':''}${escH(e.name)}${e.done?' ‚úì':''}</div><div class="cal-ev-type">${e.type==='hw'?'üìö Homework':'üìå Event'}</div></div>
    ${e.type==='custom'?`<button class="cal-ev-del" data-evdel="${e.id}">‚úï</button>`:''}
  </div>`).join('');
  c.querySelectorAll('[data-evdel]').forEach(el=>el.addEventListener('click',()=>{calEvents=calEvents.filter(x=>x.id!==el.dataset.evdel);saveAll();renderCalSide();renderCalendar();}));
}

function openAddCalEventModal(prefill){
  const dv=prefill||selectedCalDay||todayStr();
  let sel=SUBJ_COLORS[5];
  showModal(`<div class="modal-title">Add Calendar Event</div>
    <div class="modal-field"><label class="modal-label">Title</label><input class="modal-input" type="text" id="cet" placeholder="e.g. Study session‚Ä¶"/></div>
    <div class="modal-row">
      <div class="modal-field"><label class="modal-label">Date</label><input class="modal-input" type="date" id="ced" value="${dv}"/></div>
      <div class="modal-field"><label class="modal-label">Colour</label><div class="color-row" id="cec-row" style="margin-top:8px">${SUBJ_COLORS.map((c,i)=>`<div class="cswatch${i===5?' sel':''}" style="background:${c}" data-c="${c}"></div>`).join('')}</div></div>
    </div>
    <div class="modal-btns"><button class="modal-btn" id="cec">Cancel</button><button class="modal-btn primary" id="ces">Add Event</button></div>`);
  document.getElementById('cet').focus();
  document.getElementById('cec').onclick=closeModal;
  document.querySelectorAll('#cec-row .cswatch').forEach(sw=>sw.addEventListener('click',()=>{sel=sw.dataset.c;document.querySelectorAll('#cec-row .cswatch').forEach(x=>x.classList.remove('sel'));sw.classList.add('sel');}));
  document.getElementById('ces').onclick=()=>{
    const title=document.getElementById('cet').value.trim(),date=document.getElementById('ced').value;
    if(!title||!date)return;
    calEvents.push({id:'ce'+uid(),title,date,color:sel});
    selectedCalDay=date;saveAll();closeModal();renderCalendar();renderCalSide();
  };
}

document.getElementById('cal-prev').onclick=()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();};
document.getElementById('cal-next').onclick=()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();};
document.getElementById('cal-today-btn').onclick=()=>{const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();selectedCalDay=todayStr();renderCalendar();};
document.getElementById('cal-add-event-btn').onclick=()=>openAddCalEventModal();

function showModal(html){
  document.getElementById('modal-container').innerHTML=`<div class="modal-bg"><div class="modal">${html}</div></div>`;
  document.querySelector('.modal-bg').addEventListener('click',e=>{if(e.target.classList.contains('modal-bg'))closeModal();});
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}

//  TAB SWITCHING
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const hp=document.getElementById('hw-panel');
  const cp=document.getElementById('cal-panel');
  const ap=document.getElementById('avg-panel');
  hp.style.display='none'; cp.classList.remove('visible'); ap.classList.remove('visible');
  if(tab==='calendar'){cp.classList.add('visible');renderCalendar();}
  else if(tab==='averages'){ap.classList.add('visible');renderAverages();}
  else{hp.style.display='flex';renderContent();}
}
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));

}

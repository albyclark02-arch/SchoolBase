<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homework Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #eeede9;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --border-light: rgba(0,0,0,0.1);
      --border-mid: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: 'DM Sans', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1e;
        --bg-secondary: #272727;
        --bg-tertiary: #181818;
        --text-primary: #f0f0f0;
        --text-secondary: #999;
        --border-light: rgba(255,255,255,0.09);
        --border-mid: rgba(255,255,255,0.16);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    #app {
      display: flex;
      width: 100%;
      max-width: 900px;
      height: 680px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 0.5px solid var(--border-light);
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 200px;
      min-width: 200px;
      border-right: 0.5px solid var(--border-light);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s;
    }
    #sidebar-header {
      padding: 18px 14px 10px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #subject-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .subject-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: var(--radius-md);
      cursor: pointer; margin-bottom: 2px;
      transition: background 0.15s; user-select: none;
    }
    .subject-item:hover { background: rgba(0,0,0,0.07); }
    .subject-item.active { background: rgba(0,0,0,0.11); }
    .subject-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .subject-name { font-size: 13px; color: var(--text-primary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .subject-count { font-size: 11px; color: var(--text-secondary); }
    .subject-del { opacity: 0; font-size: 14px; color: var(--text-secondary); cursor: pointer; padding: 0 2px; line-height: 1; }
    .subject-item:hover .subject-del { opacity: 0.6; }
    .subject-del:hover { opacity: 1 !important; }
    #add-subject-btn {
      margin: 8px; padding: 8px 10px;
      border: 0.5px dashed var(--border-mid);
      border-radius: var(--radius-md);
      cursor: pointer; font-size: 12px;
      color: var(--text-secondary); background: none;
      text-align: left; font-family: var(--font);
      transition: background 0.15s;
    }
    #add-subject-btn:hover { background: rgba(0,0,0,0.07); }

    /* ── MAIN ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #top-tabs {
      display: flex; padding: 14px 16px 0;
      border-bottom: 0.5px solid var(--border-light);
      background: var(--bg-primary);
    }
    .top-tab {
      padding: 7px 14px; font-size: 13px; font-family: var(--font);
      color: var(--text-secondary); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -0.5px;
      transition: color 0.15s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
    }
    .top-tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }

    /* ── HW PANEL ── */
    #hw-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #content-area { flex: 1; overflow-y: auto; padding: 14px 16px; }

    .section-label {
      font-size: 10px; font-weight: 600; color: var(--text-secondary);
      letter-spacing: 0.07em; text-transform: uppercase;
      margin: 14px 0 8px;
    }
    .section-label:first-child { margin-top: 0; }

    .hw-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 10px 12px; margin-bottom: 6px;
      display: flex; align-items: flex-start; gap: 10px;
      transition: background 0.15s;
    }
    .hw-card:hover { background: var(--bg-secondary); }
    .hw-check {
      width: 17px; height: 17px; border-radius: 4px;
      border: 1.5px solid var(--border-mid);
      flex-shrink: 0; cursor: pointer; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .hw-check.checked { background: #3b8a3e; border-color: #3b8a3e; }
    .hw-check.checked::after {
      content: ''; display: block; width: 4px; height: 7px;
      border: 1.5px solid white; border-left: none; border-top: none;
      transform: rotate(40deg) translateY(-1px);
    }
    .hw-body { flex: 1; min-width: 0; }
    .hw-title { font-size: 13px; color: var(--text-primary); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hw-title.done { text-decoration: line-through; color: var(--text-secondary); }
    .hw-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .hw-subject-tag { font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
    .hw-due { font-size: 11px; padding: 2px 7px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
    .hw-due.green { background: #e8f5e9; color: #2e7d32; }
    .hw-due.yellow { background: #fffde7; color: #795548; }
    .hw-due.red { background: #fce4e4; color: #b71c1c; }
    .hw-countdown { font-size: 11px; color: var(--text-secondary); }
    .hw-smart { font-size: 11px; color: #7B52AB; background: #f3eeff; padding: 2px 7px; border-radius: 6px; margin-top: 4px; display: inline-block; }
    .hw-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .hw-card:hover .hw-actions { opacity: 1; }
    .hw-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 5px; color: var(--text-secondary); border-radius: 4px; font-family: var(--font); }
    .hw-btn:hover { background: var(--bg-tertiary); }

    /* ── ADD AREA ── */
    #add-area {
      padding: 0 16px 14px;
      background: var(--bg-primary);
      border-top: 0.5px solid var(--border-light);
    }
    #add-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 0 8px; font-size: 13px; font-family: var(--font);
      color: var(--text-secondary); cursor: pointer; user-select: none;
      background: none; border: none; width: 100%; text-align: left;
    }
    #add-toggle:hover { color: var(--text-primary); }
    #add-form { display: none; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    #add-form.open { display: flex; }
    #add-form input, #add-form select {
      font-size: 12px; padding: 5px 8px; font-family: var(--font);
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      background: var(--bg-secondary); color: var(--text-primary); height: 30px;
    }
    #add-form input[type=text] { flex: 1; min-width: 120px; }
    #add-form select { width: 115px; }
    #add-form .assess-wrap { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); }
    #add-form button {
      height: 30px; padding: 0 12px; font-size: 12px; font-family: var(--font);
      border-radius: var(--radius-md); cursor: pointer;
      border: 0.5px solid var(--border-mid);
      background: var(--bg-primary); color: var(--text-primary);
    }
    #add-form button.primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
    .field-group { display: flex; flex-direction: column; gap: 3px; }
    .field-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
    #hw-date-in { width: 138px; }

    /* ── CALENDAR ── */
    #cal-wrap { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    #cal-wrap.visible { display: flex; }
    #cal-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px 10px; background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-light);
    }
    #cal-month-label { font-size: 15px; font-weight: 500; color: var(--text-primary); flex: 1; text-align: center; }
    #cal-header button {
      background: none; border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md); cursor: pointer; font-size: 14px;
      padding: 4px 11px; color: var(--text-primary); font-family: var(--font);
    }
    #cal-header button:hover { background: var(--bg-secondary); }
    #cal-add-btn {
      font-size: 12px; padding: 5px 12px;
      background: var(--text-primary); color: var(--bg-primary);
      border: none; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font);
    }
    #cal-add-btn:hover { opacity: 0.85; }
    #cal-grid-wrap { flex: 1; overflow-y: auto; padding: 10px 12px 4px; }
    .cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
    .cal-dow { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-align: center; padding: 2px 0; }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day {
      min-height: 76px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-light);
      background: var(--bg-primary); padding: 5px 5px 4px;
      cursor: pointer; transition: background 0.12s;
    }
    .cal-day:hover { background: var(--bg-secondary); }
    .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
    .cal-day.today { border-color: var(--text-primary); }
    .cal-day-num { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 3px; display: flex; }
    .cal-day.today .cal-day-num span {
      color: var(--bg-primary); background: var(--text-primary);
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 11px;
    }
    .cal-pill {
      font-size: 10px; padding: 1px 5px; border-radius: 4px;
      margin-bottom: 2px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; font-weight: 500; display: block;
    }
    .cal-more { font-size: 10px; color: var(--text-secondary); margin-top: 1px; }

    #cal-day-panel {
      display: none; border-top: 0.5px solid var(--border-light);
      background: var(--bg-secondary); padding: 10px 16px 12px;
      max-height: 155px; overflow-y: auto;
    }
    #cal-day-panel.visible { display: block; }
    #cal-day-panel h4 { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .cal-event-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .cal-event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cal-event-name { font-size: 13px; color: var(--text-primary); flex: 1; }
    .cal-event-type { font-size: 11px; color: var(--text-secondary); }
    .cal-event-del { font-size: 13px; color: var(--text-secondary); cursor: pointer; opacity: 0.5; background: none; border: none; font-family: var(--font); }
    .cal-event-del:hover { opacity: 1; }
    #cal-day-panel .empty-msg { font-size: 13px; color: var(--text-secondary); }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal {
      background: var(--bg-primary); border-radius: var(--radius-lg);
      padding: 22px; width: 320px;
      border: 0.5px solid var(--border-mid);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .modal h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; color: var(--text-primary); }
    .modal input, .modal select {
      width: 100%; font-size: 13px; padding: 7px 10px; font-family: var(--font);
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      background: var(--bg-secondary); color: var(--text-primary); margin-bottom: 10px;
    }
    .modal-field-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; margin-bottom: 3px; display: block; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .modal-btns button {
      font-size: 13px; padding: 7px 16px; border-radius: var(--radius-md);
      cursor: pointer; border: 0.5px solid var(--border-mid);
      background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font);
    }
    .modal-btns button.primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
    .modal-btns button.danger { background: #fce4e4; color: #b71c1c; border-color: #f5b7b7; }
    .modal-body-text { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; }
    .color-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
    .color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.sel { border-color: var(--text-primary); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-secondary); font-size: 13px; line-height: 1.6; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">Subjects</div>
    <div id="subject-list"></div>
    <button id="add-subject-btn">+ Add Subject</button>
  </div>

  <div id="main">
    <div id="top-tabs">
      <button class="top-tab active" data-tab="all">All Tasks</button>
      <button class="top-tab" data-tab="today">Today</button>
      <button class="top-tab" data-tab="calendar">Calendar</button>
      <button class="top-tab" data-tab="completed">Completed</button>
    </div>

    <!-- HW PANEL -->
    <div id="hw-panel">
      <div id="content-area"></div>
      <div id="add-area">
        <button id="add-toggle">+ Add homework</button>
        <div id="add-form">
          <input type="text" id="hw-title-in" placeholder="Homework title..." />
          <div class="field-group">
            <span class="field-label">Due by</span>
            <input type="date" id="hw-date-in" />
          </div>
          <select id="hw-subj-in"></select>
          <div class="assess-wrap">
            <input type="checkbox" id="hw-assess-in" />
            <label for="hw-assess-in">Assessment</label>
          </div>
          <button class="primary" id="hw-submit">Add</button>
          <button id="hw-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <!-- CALENDAR PANEL -->
    <div id="cal-wrap">
      <div id="cal-header">
        <button id="cal-prev">‹</button>
        <span id="cal-month-label"></span>
        <button id="cal-next">›</button>
        <button id="cal-add-btn">+ Add event</button>
      </div>
      <div id="cal-grid-wrap">
        <div class="cal-dow-row">
          <div class="cal-dow">Sun</div>
          <div class="cal-dow">Mon</div>
          <div class="cal-dow">Tue</div>
          <div class="cal-dow">Wed</div>
          <div class="cal-dow">Thu</div>
          <div class="cal-dow">Fri</div>
          <div class="cal-dow">Sat</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>
      <div id="cal-day-panel">
        <h4 id="cal-panel-title"></h4>
        <div id="cal-panel-events"></div>
      </div>
    </div>
  </div>
</div>

<div id="modal-container"></div>

<script>
  const COLORS = ['#e05c5c','#e0885c','#d4b84a','#6ab04c','#3fa9a9','#5c7be0','#9b5ce0','#e05ca0','#888888'];
  const DEFAULT_SUBJECTS = [
    { id: 's1', name: 'Maths',   color: '#5c7be0' },
    { id: 's2', name: 'English', color: '#6ab04c' },
    { id: 's3', name: 'Science', color: '#3fa9a9' },
  ];

  function load(k, def) { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } }
  function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  let subjects  = load('hw_subjects',   DEFAULT_SUBJECTS);
  let tasks     = load('hw_tasks',      []);
  let calEvents = load('hw_cal_events', []);
  let activeSubject = 'all';
  let activeTab     = 'all';
  let calYear, calMonth, selectedDay = null;
  const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth();

  function todayStr()    { return new Date().toISOString().slice(0,10); }
  function tomorrowStr() { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
  function daysUntil(due){ return Math.round((new Date(due)-new Date(todayStr()))/(864e5)); }
  function escH(s)       { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function saveAll()     { save('hw_subjects',subjects); save('hw_tasks',tasks); save('hw_cal_events',calEvents); }

  function hexToRgba(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function formatDate(d) {
    if (!d) return '';
    return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  }
  function formatDateLong(d) {
    if (!d) return '';
    return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  }

  function dueLabel(due) {
    const d = daysUntil(due);
    if (d < 0)  return { text:'Overdue',           cls:'red'    };
    if (d === 0) return { text:'Due today',         cls:'red'    };
    if (d === 1) return { text:'Due tomorrow',      cls:'yellow' };
    if (d <= 3)  return { text:`Due in ${d} days`,  cls:'yellow' };
    return              { text:`Due in ${d} days`,  cls:'green'  };
  }
  function smartSuggest(due) {
    const d = daysUntil(due);
    return (d >= 2 && d <= 4) ? 'You should start this today' : null;
  }

  /* ─── SIDEBAR ─── */
  function getSidebarBg() {
    if (activeSubject === 'all') return 'var(--bg-primary)';
    const s = subjects.find(x => x.id === activeSubject);
    return s ? hexToRgba(s.color, 0.2) : 'var(--bg-primary)';
  }

  function updateSidebarColor() {
    const sidebar = document.getElementById('sidebar');
    const header  = document.getElementById('sidebar-header');
    const addBtn  = document.getElementById('add-subject-btn');
    sidebar.style.background = getSidebarBg();
    if (activeSubject !== 'all') {
      const s = subjects.find(x => x.id === activeSubject);
      if (s) {
        header.style.color = s.color;
        addBtn.style.borderColor = hexToRgba(s.color, 0.45);
        addBtn.style.color = s.color;
      }
    } else {
      header.style.color = '';
      addBtn.style.borderColor = '';
      addBtn.style.color = '';
    }
  }

  function renderSidebar() {
    const list = document.getElementById('subject-list');
    const allItem = `<div class="subject-item${activeSubject==='all'?' active':''}" data-sid="all">
      <div class="subject-dot" style="background:#aaa"></div>
      <span class="subject-name">All subjects</span>
      <span class="subject-count">${tasks.filter(t=>!t.done).length}</span>
    </div>`;
    const items = subjects.map(s => {
      const cnt = tasks.filter(t => t.subjectId===s.id && !t.done).length;
      return `<div class="subject-item${activeSubject===s.id?' active':''}" data-sid="${s.id}">
        <div class="subject-dot" style="background:${s.color}"></div>
        <span class="subject-name">${escH(s.name)}</span>
        <span class="subject-count">${cnt}</span>
        <span class="subject-del" data-del="${s.id}">×</span>
      </div>`;
    }).join('');
    list.innerHTML = allItem + items;
    updateSidebarColor();

    list.querySelectorAll('.subject-item[data-sid]').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.dataset.del) return;
        activeSubject = el.dataset.sid;
        renderAll();
      });
    });
    list.querySelectorAll('.subject-del[data-del]').forEach(el => {
      el.addEventListener('click', e => { e.stopPropagation(); confirmDeleteSubject(el.dataset.del); });
    });
  }

  function confirmDeleteSubject(sid) {
    const s = subjects.find(x => x.id === sid);
    showModal(`<h3>Remove "${escH(s.name)}"?</h3>
      <p class="modal-body-text">Tasks for this subject will also be removed.</p>
      <div class="modal-btns">
        <button id="mc">Cancel</button>
        <button class="danger" id="md">Remove</button>
      </div>`);
    document.getElementById('mc').onclick = closeModal;
    document.getElementById('md').onclick = () => {
      subjects = subjects.filter(x => x.id !== sid);
      tasks    = tasks.filter(t => t.subjectId !== sid);
      if (activeSubject === sid) activeSubject = 'all';
      saveAll(); closeModal(); renderAll();
    };
  }

  /* ─── ADD FORM ─── */
  function renderAddForm() {
    document.getElementById('hw-subj-in').innerHTML =
      subjects.map(s => `<option value="${s.id}">${escH(s.name)}</option>`).join('');
  }

  /* ─── TASK CARDS ─── */
  function filterTasks() {
    let t = tasks;
    if (activeSubject !== 'all') t = t.filter(x => x.subjectId === activeSubject);
    if (activeTab === 'completed') return t.filter(x => x.done);
    if (activeTab === 'today')     return t.filter(x => !x.done && (x.dueDate===todayStr()||x.dueDate===tomorrowStr()));
    return t.filter(x => !x.done);
  }

  function taskCard(t) {
    const subj   = subjects.find(s => s.id === t.subjectId) || { name:'?', color:'#aaa' };
    const due    = dueLabel(t.dueDate);
    const smart  = !t.done ? smartSuggest(t.dueDate) : null;
    const subjBg = hexToRgba(subj.color, 0.13);
    return `<div class="hw-card">
      <div class="hw-check${t.done?' checked':''}" data-chk="${t.id}"></div>
      <div class="hw-body">
        <div class="hw-title${t.done?' done':''}">${t.isAssessment?'⚠️ ':''}<span>${escH(t.title)}</span></div>
        <div class="hw-meta">
          <span class="hw-subject-tag" style="background:${subjBg};color:${subj.color}">${escH(subj.name)}</span>
          <span class="hw-due ${due.cls}">${due.text}</span>
          ${t.isAssessment ? '<span style="font-size:12px">📄</span>' : ''}
          <span class="hw-countdown">${formatDate(t.dueDate)}</span>
        </div>
        ${smart ? `<span class="hw-smart">✦ ${smart}</span>` : ''}
      </div>
      <div class="hw-actions">
        <button class="hw-btn" data-edit="${t.id}" title="Edit">✎</button>
        <button class="hw-btn" data-rm="${t.id}"   title="Delete">✕</button>
      </div>
    </div>`;
  }

  function renderContent() {
    const area     = document.getElementById('content-area');
    const filtered = filterTasks();

    if (activeTab === 'all') {
      const urgent = filtered.filter(t => t.dueDate===todayStr()||t.dueDate===tomorrowStr());
      const rest   = filtered.filter(t => t.dueDate!==todayStr()&&t.dueDate!==tomorrowStr());
      if (!filtered.length) { area.innerHTML = `<div class="empty-state">No tasks yet.<br>Add homework below ↓</div>`; bindCards(); return; }
      let html = '';
      if (urgent.length) html += `<div class="section-label">Today &amp; due soon</div>` + urgent.map(taskCard).join('');
      if (rest.length)   html += `<div class="section-label">Upcoming</div>`             + rest.map(taskCard).join('');
      area.innerHTML = html;
    } else if (activeTab === 'today') {
      if (!filtered.length) { area.innerHTML = `<div class="empty-state">Nothing due today or tomorrow.</div>`; bindCards(); return; }
      const tdy = filtered.filter(t => t.dueDate===todayStr());
      const tmr = filtered.filter(t => t.dueDate===tomorrowStr());
      let html = '';
      if (tdy.length) html += `<div class="section-label">Due today</div>`    + tdy.map(taskCard).join('');
      if (tmr.length) html += `<div class="section-label">Due tomorrow</div>` + tmr.map(taskCard).join('');
      area.innerHTML = html;
    } else {
      if (!filtered.length) { area.innerHTML = `<div class="empty-state">No completed tasks yet.</div>`; bindCards(); return; }
      area.innerHTML = filtered.map(taskCard).join('');
    }
    bindCards();
  }

  function bindCards() {
    const area = document.getElementById('content-area');
    area.querySelectorAll('[data-chk]').forEach(el => {
      el.addEventListener('click', () => {
        const t = tasks.find(x => x.id === el.dataset.chk);
        if (t) { t.done = !t.done; saveAll(); renderAll(); }
      });
    });
    area.querySelectorAll('[data-edit]').forEach(el => {
      el.addEventListener('click', () => openEditModal(el.dataset.edit));
    });
    area.querySelectorAll('[data-rm]').forEach(el => {
      el.addEventListener('click', () => { tasks = tasks.filter(x => x.id !== el.dataset.rm); saveAll(); renderAll(); });
    });
  }

  /* ─── CALENDAR ─── */
  function calDateStr(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function eventsForDate(ds) {
    const hw = tasks.filter(t => t.dueDate === ds).map(t => ({
      id: t.id, name: t.title,
      color: (subjects.find(s => s.id === t.subjectId) || { color:'#aaa' }).color,
      type: 'hw', isAssessment: t.isAssessment
    }));
    const custom = calEvents.filter(e => e.date === ds).map(e => ({
      id: e.id, name: e.title, color: e.color, type: 'custom'
    }));
    return [...hw, ...custom];
  }

  function renderCalendar() {
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('cal-month-label').textContent = `${MONTHS[calMonth]} ${calYear}`;

    const firstDay    = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const td          = todayStr();
    let html = '';

    for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
      const ds     = calDateStr(calYear, calMonth, d);
      const isToday = ds === td;
      const events = eventsForDate(ds);
      const pills  = events.slice(0, 3).map(e => {
        const bg = hexToRgba(e.color, 0.18);
        return `<span class="cal-pill" style="background:${bg};color:${e.color}">${e.isAssessment?'⚠️ ':''}${escH(e.name)}</span>`;
      }).join('');
      const more = events.length > 3 ? `<div class="cal-more">+${events.length-3} more</div>` : '';
      html += `<div class="cal-day${isToday?' today':''}" data-date="${ds}">
        <div class="cal-day-num">${isToday ? `<span>${d}</span>` : d}</div>
        ${pills}${more}
      </div>`;
    }
    document.getElementById('cal-days').innerHTML = html;

    document.querySelectorAll('.cal-day[data-date]').forEach(el => {
      el.addEventListener('click', () => { selectedDay = el.dataset.date; renderDayPanel(); });
    });
    if (selectedDay) renderDayPanel();
  }

  function renderDayPanel() {
    const panel  = document.getElementById('cal-day-panel');
    const events = eventsForDate(selectedDay);
    document.getElementById('cal-panel-title').textContent = formatDateLong(selectedDay);

    if (!events.length) {
      document.getElementById('cal-panel-events').innerHTML = `<div class="empty-msg">No events on this day.</div>`;
    } else {
      document.getElementById('cal-panel-events').innerHTML = events.map(e => `
        <div class="cal-event-row">
          <div class="cal-event-dot" style="background:${e.color}"></div>
          <span class="cal-event-name">${e.isAssessment?'⚠️ ':''}${escH(e.name)}</span>
          <span class="cal-event-type">${e.type==='hw'?'Homework':'Event'}</span>
          ${e.type==='custom' ? `<button class="cal-event-del" data-evdel="${e.id}">✕</button>` : ''}
        </div>`).join('');

      document.querySelectorAll('[data-evdel]').forEach(el => {
        el.addEventListener('click', () => {
          calEvents = calEvents.filter(x => x.id !== el.dataset.evdel);
          saveAll(); renderDayPanel(); renderCalendar();
        });
      });
    }
    panel.classList.add('visible');
  }

  function openAddCalEventModal(prefillDate) {
    const dateVal = prefillDate || selectedDay || todayStr();
    showModal(`<h3>Add calendar event</h3>
      <input type="text" id="cet" placeholder="Event title..." />
      <label class="modal-field-label">Date</label>
      <input type="date" id="ced" value="${dateVal}" />
      <label class="modal-field-label">Colour</label>
      <div class="color-row" id="ce-colors">
        ${COLORS.map((c,i) => `<div class="color-swatch${i===5?' sel':''}" style="background:${c}" data-c="${c}"></div>`).join('')}
      </div>
      <div class="modal-btns">
        <button id="cec">Cancel</button>
        <button class="primary" id="ces">Add</button>
      </div>`);
    let selColor = COLORS[5];
    document.getElementById('cec').onclick = closeModal;
    document.querySelectorAll('#ce-colors .color-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        selColor = sw.dataset.c;
        document.querySelectorAll('#ce-colors .color-swatch').forEach(x => x.classList.remove('sel'));
        sw.classList.add('sel');
      });
    });
    document.getElementById('ces').onclick = () => {
      const title = document.getElementById('cet').value.trim();
      const date  = document.getElementById('ced').value;
      if (!title || !date) return;
      calEvents.push({ id:'ce'+Date.now(), title, date, color:selColor });
      selectedDay = date;
      saveAll(); closeModal(); renderCalendar(); renderDayPanel();
    };
  }

  document.getElementById('cal-prev').addEventListener('click', () => {
    calMonth--; if (calMonth < 0) { calMonth=11; calYear--; } renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calMonth++; if (calMonth > 11) { calMonth=0; calYear++; } renderCalendar();
  });
  document.getElementById('cal-add-btn').addEventListener('click', () => openAddCalEventModal());

  /* ─── TAB SWITCHING ─── */
  function showHwPanel()  {
    document.getElementById('hw-panel').style.display = 'flex';
    document.getElementById('cal-wrap').classList.remove('visible');
  }
  function showCalPanel() {
    document.getElementById('hw-panel').style.display = 'none';
    document.getElementById('cal-wrap').classList.add('visible');
    renderCalendar();
  }

  function renderAll() {
    renderSidebar();
    renderAddForm();
    if (activeTab === 'calendar') { showCalPanel(); }
    else { showHwPanel(); renderContent(); }
  }

  document.querySelectorAll('.top-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeTab = tab.dataset.tab;
      document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderAll();
    });
  });

  /* ─── MODALS ─── */
  function showModal(html) {
    document.getElementById('modal-container').innerHTML =
      `<div class="modal-bg"><div class="modal">${html}</div></div>`;
  }
  function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

  function openEditModal(id) {
    const t = tasks.find(x => x.id === id); if (!t) return;
    const opts = subjects.map(s =>
      `<option value="${s.id}"${t.subjectId===s.id?' selected':''}>${escH(s.name)}</option>`).join('');
    showModal(`<h3>Edit task</h3>
      <input type="text" id="et" value="${escH(t.title)}" placeholder="Title" />
      <div style="margin-bottom:10px">
        <label class="modal-field-label">Due by</label>
        <input type="date" id="ed" value="${t.dueDate}" style="margin-bottom:0" />
      </div>
      <select id="es">${opts}</select>
      <div style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:10px">
        <input type="checkbox" id="ea" ${t.isAssessment?'checked':''}/>
        <label for="ea">Assessment</label>
      </div>
      <div class="modal-btns">
        <button id="ec">Cancel</button>
        <button class="primary" id="es2">Save</button>
      </div>`);
    document.getElementById('ec').onclick = closeModal;
    document.getElementById('es2').onclick = () => {
      const title  = document.getElementById('et').value.trim();
      const date   = document.getElementById('ed').value;
      const sid    = document.getElementById('es').value;
      const assess = document.getElementById('ea').checked;
      if (!title || !date) return;
      t.title=title; t.dueDate=date; t.subjectId=sid; t.isAssessment=assess;
      saveAll(); closeModal(); renderAll();
    };
  }

  function openAddSubjectModal() {
    let selColor = COLORS[subjects.length % COLORS.length];
    showModal(`<h3>New subject</h3>
      <input type="text" id="sn" placeholder="Subject name..." />
      <label class="modal-field-label">Pick a colour</label>
      <div class="color-row" id="color-row">
        ${COLORS.map(c => `<div class="color-swatch${c===selColor?' sel':''}" style="background:${c}" data-c="${c}"></div>`).join('')}
      </div>
      <div class="modal-btns">
        <button id="sc">Cancel</button>
        <button class="primary" id="ss">Add subject</button>
      </div>`);
    document.getElementById('sc').onclick = closeModal;
    document.querySelectorAll('#color-row .color-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        selColor = sw.dataset.c;
        document.querySelectorAll('#color-row .color-swatch').forEach(x => x.classList.remove('sel'));
        sw.classList.add('sel');
      });
    });
    document.getElementById('ss').onclick = () => {
      const name = document.getElementById('sn').value.trim(); if (!name) return;
      subjects.push({ id:'s'+Date.now(), name, color:selColor });
      saveAll(); closeModal(); renderAll();
    };
  }

  /* ─── WIRE UP STATIC BUTTONS ─── */
  document.getElementById('add-subject-btn').addEventListener('click', openAddSubjectModal);

  document.getElementById('add-toggle').addEventListener('click', () => {
    const f    = document.getElementById('add-form');
    const open = f.classList.toggle('open');
    document.getElementById('add-toggle').textContent = open ? '▲ Close' : '+ Add homework';
    if (open) document.getElementById('hw-date-in').value = todayStr();
  });

  document.getElementById('hw-cancel').addEventListener('click', () => {
    document.getElementById('add-form').classList.remove('open');
    document.getElementById('add-toggle').textContent = '+ Add homework';
  });

  document.getElementById('hw-submit').addEventListener('click', () => {
    const title      = document.getElementById('hw-title-in').value.trim();
    const dueDate    = document.getElementById('hw-date-in').value;
    const subjectId  = document.getElementById('hw-subj-in').value;
    const isAssessment = document.getElementById('hw-assess-in').checked;
    if (!title || !dueDate || !subjectId) return;
    tasks.push({ id:'t'+Date.now(), title, dueDate, subjectId, isAssessment, done:false, created:todayStr() });
    document.getElementById('hw-title-in').value = '';
    document.getElementById('hw-assess-in').checked = false;
    saveAll(); renderAll();
  });

  /* ─── BOOT ─── */
  renderAll();
</script>
</body>
</html>

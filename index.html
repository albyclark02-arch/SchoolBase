<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--bg2:#ffffff;--bg3:#eeecea;--bg4:#e5e3df;
  --txt:#1c1b19;--txt2:#6b6966;--txt3:#9c9895;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --acc:#6c3fc5;--acc2:#f0eaff;
  --r:8px;--rl:12px;--rx:18px;
  --font:'DM Sans',system-ui,sans-serif;
  --red-bg:#fdecea;--red:#c0392b;
  --yellow-bg:#fef9e7;--yellow:#8a6d00;
  --green-bg:#eaf5ea;--green:#276227;
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --shadow-lg:0 8px 40px rgba(0,0,0,.13);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;flex-direction:column;transition:background .3s,color .3s}

/* NAV */
#topnav{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);height:52px;flex-shrink:0;z-index:10;transition:background .3s}
#nav-brand{font-size:15px;font-weight:600;color:var(--txt);padding:0 18px;white-space:nowrap;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:9px;cursor:pointer}
#nav-brand img{width:28px;height:28px;border-radius:6px;object-fit:cover}
#nav-brand span{font-size:15px;font-weight:600}
#nav-tabs{display:flex;flex:1;height:100%;padding:0 6px;overflow-x:auto;scrollbar-width:none}
#nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{display:flex;align-items:center;gap:5px;padding:0 14px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;border:none;background:none;font-family:var(--font);height:100%;border-bottom:2px solid transparent;transition:color .15s;white-space:nowrap;flex-shrink:0}
.nav-tab:hover{color:var(--txt)}
.nav-tab.active{color:var(--txt);border-bottom-color:var(--acc)}
#nav-right{display:flex;align-items:center;gap:8px;padding:0 14px;margin-left:auto;flex-shrink:0}
#search-wrap{position:relative}
#search-input{width:180px;height:32px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--txt);font-size:12px;font-family:var(--font);padding:0 12px 0 32px;transition:width .2s,box-shadow .2s}
#search-input:focus{outline:none;box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 20%,transparent);width:240px}
#search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--txt3);pointer-events:none}
#add-hw-btn{height:32px;padding:0 14px;border-radius:20px;background:var(--acc);color:#fff;border:none;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:opacity .15s}
#add-hw-btn:hover{opacity:.85}
.icon-btn{height:32px;width:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0}
.icon-btn:hover{background:var(--bg4)}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:215px;min-width:215px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background .3s}
#sidebar-top{padding:14px 12px 8px;font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase}
#subject-list{flex:1;overflow-y:auto;padding:0 8px}
.subj-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:1px;transition:background .12s;user-select:none}
.subj-item:hover{background:rgba(0,0,0,0.06)}
.subj-item.active{background:rgba(0,0,0,0.1)}
.subj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.subj-name{font-size:13px;color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subj-count{font-size:11px;color:var(--txt2)}
.subj-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s}
.subj-item:hover .subj-actions{opacity:1}
.subj-act-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--txt3);padding:2px 4px;border-radius:4px;font-family:var(--font);line-height:1}
.subj-act-btn:hover{color:var(--txt);background:var(--bg3)}
#sidebar-footer{padding:8px 12px 14px}
#add-subj-btn{width:100%;padding:8px 10px;border:1px dashed var(--border2);border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--txt2);background:none;text-align:left;font-family:var(--font);transition:background .12s}
#add-subj-btn:hover{background:rgba(0,0,0,0.05)}

/* STREAK BAR */
#streak-bar{padding:8px 12px 4px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2)}
#streak-bar span{font-size:14px}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#hw-panel{display:flex;flex-direction:column;flex:1;overflow:hidden}
#content-area{flex:1;overflow-y:auto;padding:20px 24px}

/* SECTION HEADERS */
.section-hd{display:flex;align-items:center;gap:8px;margin:20px 0 10px}
.section-hd:first-child{margin-top:0}
.section-hd-label{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.07em;text-transform:uppercase}
.section-hd-line{flex:1;height:1px;background:var(--border)}
.section-hd-count{font-size:11px;color:var(--txt3)}

/* TASK CARD */
.hw-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:box-shadow .15s}
.hw-card:hover{box-shadow:var(--shadow)}
.hw-card.overdue-card{border-left:3px solid var(--red)}
.hw-card.assessment-card{border-left:3px solid var(--acc)}
.hw-card.high-priority{border-left:3px solid #e07c3a}
.hw-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.hw-check:hover{border-color:var(--acc)}
.hw-check.checked{background:#3a8a3e;border-color:#3a8a3e}
.hw-check.checked::after{content:'';display:block;width:4px;height:7px;border:1.5px solid #fff;border-left:none;border-top:none;transform:rotate(40deg) translateY(-1px)}
.hw-body{flex:1;min-width:0}
.hw-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hw-title-wrap{flex:1;min-width:0}
.hw-title{font-size:14px;color:var(--txt);font-weight:500;line-height:1.3}
.hw-title.done{text-decoration:line-through;color:var(--txt3)}
.hw-notes{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.4}
.hw-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s;flex-shrink:0}
.hw-card:hover .hw-actions{opacity:1}
.hw-act{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 6px;color:var(--txt2);border-radius:5px;font-family:var(--font)}
.hw-act:hover{background:var(--bg3);color:var(--txt)}
.hw-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.hw-subj-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.hw-due-badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;white-space:nowrap}
.due-green{background:var(--green-bg);color:var(--green)}
.due-yellow{background:var(--yellow-bg);color:var(--yellow)}
.due-red{background:var(--red-bg);color:var(--red)}
.hw-date-txt{font-size:11px;color:var(--txt3)}
.hw-smart{font-size:11px;color:var(--acc);background:var(--acc2);padding:2px 8px;border-radius:6px}
.hw-completed-at{font-size:11px;color:var(--txt3);font-style:italic}
.assess-badge{font-size:11px;background:var(--acc2);color:var(--acc);padding:2px 8px;border-radius:6px;font-weight:500}
.grade-badge{font-size:12px;font-weight:600;padding:2px 10px;border-radius:6px}
.priority-badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.p-high{background:#fff0e6;color:#c05000}
.p-medium{background:#fef9e7;color:#8a6d00}
.p-low{background:var(--green-bg);color:var(--green)}
.time-badge{font-size:11px;color:var(--txt3);padding:2px 8px;border-radius:6px;background:var(--bg3)}
.hl{background:#fff176;color:#000;border-radius:2px;padding:0 1px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--txt2)}
.empty-state .e-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state .e-title{font-size:15px;font-weight:500;margin-bottom:6px}
.empty-state .e-sub{font-size:13px;color:var(--txt3)}

/* AVERAGES */
#avg-panel{display:none;flex:1;overflow-y:auto;padding:24px}
#avg-panel.visible{display:block}
.avg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.avg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px;transition:box-shadow .15s}
.avg-card:hover{box-shadow:var(--shadow)}
.avg-card-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.avg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.avg-subj-name{font-size:15px;font-weight:600;color:var(--txt);flex:1}
.avg-target-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;color:var(--txt3)}
.avg-target-input{width:54px;font-size:12px;padding:2px 6px;border:1px solid var(--border2);border-radius:5px;background:var(--bg3);color:var(--txt);font-family:var(--font)}
.avg-target-input:focus{outline:none;border-color:var(--acc)}
.avg-trend{font-size:14px;margin-left:auto}
.avg-score-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:10px}
.avg-score{font-size:42px;font-weight:700;line-height:1}
.avg-score-pct{font-size:18px;color:var(--txt2);margin-bottom:6px}
.avg-grade-lbl{font-size:13px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:6px}
.avg-bar-wrap{background:var(--bg3);border-radius:20px;height:10px;overflow:visible;margin-bottom:14px;position:relative}
.avg-bar{height:100%;border-radius:20px;transition:width .6s ease;position:relative}
.avg-target-line{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--txt3);border-radius:2px;opacity:.6}
.avg-history{border-top:1px solid var(--border);padding-top:12px}
.avg-history-title{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.avg-hist-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.avg-hist-row:last-child{border-bottom:none}
.avg-hist-name{font-size:12px;color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.avg-hist-weight{font-size:11px;color:var(--txt3)}
.avg-hist-score{font-size:12px;font-weight:600}
.avg-hist-date{font-size:11px;color:var(--txt3)}
.avg-no-data{text-align:center;padding:40px 20px;color:var(--txt3);font-size:13px}

/* CALENDAR */
#cal-panel{display:none;flex-direction:column;flex:1;overflow:hidden}
#cal-panel.visible{display:flex}
#cal-header{display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
#cal-month-lbl{font-size:16px;font-weight:600;flex:1;text-align:center}
.cal-nav-btn{background:none;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--txt);transition:background .12s;font-family:var(--font)}
.cal-nav-btn:hover{background:var(--bg3)}
#cal-today-btn,#cal-week-btn{font-size:12px;padding:0 12px;height:32px;border-radius:var(--r);border:1px solid var(--border2);background:none;color:var(--txt);cursor:pointer;font-family:var(--font);transition:background .12s}
#cal-today-btn:hover,#cal-week-btn:hover{background:var(--bg3)}
#cal-week-btn.active{background:var(--acc2);color:var(--acc);border-color:var(--acc)}
#cal-add-event-btn{font-size:12px;padding:0 14px;height:32px;border-radius:var(--r);background:var(--acc);color:#fff;border:none;cursor:pointer;font-family:var(--font);font-weight:500;transition:opacity .15s}
#cal-add-event-btn:hover{opacity:.85}
#cal-body{display:flex;flex:1;overflow:hidden}
#cal-grid-wrap{flex:1;overflow-y:auto;padding:14px}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-dow{font-size:11px;font-weight:600;color:var(--txt3);text-align:center;padding:3px 0;text-transform:uppercase;letter-spacing:.04em}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{min-height:86px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);padding:5px;cursor:pointer;transition:background .12s}
.cal-day:hover{background:var(--bg3)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cal-day.today{border-color:var(--acc);border-width:1.5px}
.cal-day.selected{background:var(--bg3)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--txt3);margin-bottom:3px;display:flex}
.cal-day.today .cal-day-num .ni{background:var(--acc);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-pill{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;display:block;line-height:1.4}
.cal-more{font-size:10px;color:var(--txt3);margin-top:1px}
/* week view */
.cal-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;height:100%}
.cal-week-col{border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
.cal-week-hd{padding:8px 6px 6px;border-bottom:1px solid var(--border);text-align:center}
.cal-week-hd-day{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase}
.cal-week-hd-num{font-size:18px;font-weight:600;color:var(--txt);line-height:1.1}
.cal-week-hd-num.today-num{color:var(--acc)}
.cal-week-events{flex:1;overflow-y:auto;padding:6px}
.cal-week-pill{font-size:11px;padding:3px 7px;border-radius:5px;margin-bottom:3px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
#cal-side{width:270px;min-width:270px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
#cal-side-hd{padding:12px 14px 10px;font-size:13px;font-weight:600;color:var(--txt);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#cal-side-hd span{font-size:12px;font-weight:400;color:var(--txt3)}
#cal-side-events{flex:1;overflow-y:auto;padding:10px 14px}
.cal-ev-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.cal-ev-row:last-child{border-bottom:none}
.cal-ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cal-ev-body{flex:1;min-width:0}
.cal-ev-name{font-size:13px;color:var(--txt);font-weight:500}
.cal-ev-type{font-size:11px;color:var(--txt3);margin-top:1px}
.cal-ev-del{background:none;border:none;cursor:pointer;font-size:12px;color:var(--txt3);padding:2px 4px;border-radius:4px;font-family:var(--font);flex-shrink:0}
.cal-ev-del:hover{background:var(--red-bg);color:var(--red)}

/* TIMER PANEL */
#timer-panel{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:24px}
#timer-panel.visible{display:flex}
.timer-circle{width:240px;height:240px;position:relative;display:flex;align-items:center;justify-content:center}
.timer-svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:var(--bg3);stroke-width:10}
.timer-prog{fill:none;stroke:var(--acc);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.timer-display{text-align:center;z-index:1}
.timer-time{font-size:52px;font-weight:700;color:var(--txt);letter-spacing:-2px;line-height:1}
.timer-label{font-size:13px;color:var(--txt3);margin-top:4px}
.timer-task-sel{font-size:13px;color:var(--txt2);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:7px 12px;font-family:var(--font);width:280px}
.timer-task-sel:focus{outline:none;border-color:var(--acc)}
.timer-btns{display:flex;gap:10px}
.timer-btn{height:40px;padding:0 24px;border-radius:20px;border:none;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font);transition:opacity .15s}
.timer-btn.start{background:var(--acc);color:#fff}
.timer-btn.stop{background:var(--red-bg);color:var(--red)}
.timer-btn.reset{background:var(--bg3);color:var(--txt);border:1px solid var(--border2)}
.timer-btn:hover{opacity:.85}
.timer-mode-btns{display:flex;gap:6px}
.timer-mode-btn{height:28px;padding:0 12px;border-radius:14px;border:1px solid var(--border2);background:none;color:var(--txt2);font-size:12px;cursor:pointer;font-family:var(--font);transition:background .12s}
.timer-mode-btn.active{background:var(--acc2);color:var(--acc);border-color:var(--acc)}
.timer-sessions{font-size:13px;color:var(--txt3)}
.timer-sessions span{color:var(--acc);font-weight:600}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border-radius:var(--rx);padding:26px;width:440px;max-width:calc(100vw - 32px);border:1px solid var(--border2);box-shadow:var(--shadow-lg);max-height:calc(100vh - 60px);overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px;color:var(--txt)}
.modal-field{margin-bottom:12px}
.modal-label{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:4px}
.modal-input{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--txt);font-family:var(--font);transition:border-color .15s}
.modal-input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 12%,transparent)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-check-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.modal-check-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--acc)}
.modal-check-row label{font-size:13px;color:var(--txt);cursor:pointer}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-btn{font-size:13px;font-weight:500;padding:8px 18px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--txt);font-family:var(--font);transition:background .12s}
.modal-btn:hover{background:var(--bg4)}
.modal-btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.modal-btn.primary:hover{opacity:.87}
.modal-btn.danger{background:var(--red-bg);color:var(--red);border-color:transparent}
.color-row{display:flex;gap:7px;flex-wrap:wrap}
.cswatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{border-color:var(--txt)}
textarea.modal-input{height:64px;resize:vertical;line-height:1.5;font-size:13px}
.grade-input-big{font-size:46px;font-weight:700;text-align:center;width:100%;padding:10px;border:2px solid var(--border2);border-radius:var(--rl);background:var(--bg3);color:var(--txt);font-family:var(--font)}
.grade-input-big:focus{outline:none;border-color:var(--acc)}
.grade-preview{text-align:center;font-size:20px;font-weight:700;padding:7px;border-radius:var(--r);margin-top:7px;transition:background .2s,color .2s}

/* THEME MODAL */
.theme-modal-body{display:flex;flex-direction:column;gap:18px}
.theme-section-label{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.preset-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.preset-card{border:2px solid var(--border);border-radius:9px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;position:relative}
.preset-card:hover{transform:scale(1.04)}
.preset-card.active{border-color:var(--acc)}
.preset-card.active::after{content:'✓';position:absolute;top:3px;right:5px;font-size:10px;font-weight:700;color:var(--acc)}
.preset-preview{height:34px;display:flex}
.pp-s{width:30%}
.pp-m{flex:1;display:flex;flex-direction:column;padding:4px;gap:2px}
.pp-bar{height:3px;border-radius:2px;opacity:.7}
.preset-name{font-size:10px;font-weight:500;text-align:center;padding:4px 2px;background:var(--bg3);color:var(--txt2)}
.spectrum-wrap{display:flex;flex-direction:column;gap:10px}
.spectrum-row{display:flex;align-items:center;gap:12px}
.spectrum-label{font-size:12px;color:var(--txt2);width:76px;flex-shrink:0}
.spectrum-track{flex:1;height:14px;border-radius:7px;position:relative;cursor:pointer;border:1px solid var(--border)}
.spectrum-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.25);position:absolute;top:50%;transform:translate(-50%,-50%);cursor:grab}
.spectrum-thumb:active{cursor:grabbing}
.spectrum-preview-box{width:100%;height:90px;border-radius:var(--rl);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;margin-top:4px}
.spv-swatch-row{display:flex;gap:8px}
.spv-swatch{width:26px;height:26px;border-radius:6px}

/* APP NAME MODAL */
.app-name-preview{font-size:22px;font-weight:700;color:var(--acc);text-align:center;padding:10px;margin-top:6px}

/* ADD DRAWER */
#add-drawer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border2);padding:18px 24px 26px;z-index:200;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.1)}
#add-drawer.open{transform:translateY(0)}
#drawer-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
#drawer-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt3);font-family:var(--font)}
#drawer-close:hover{color:var(--txt)}
#drawer-grid{display:grid;grid-template-columns:2fr 150px 150px 120px 90px;gap:10px;align-items:end}
.drawer-label{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:4px}
.drawer-input{width:100%;font-size:13px;padding:8px 11px;height:36px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--txt);font-family:var(--font)}
.drawer-input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 12%,transparent)}
#drawer-assess-row{display:flex;align-items:center;gap:5px;height:36px}
#drawer-assess-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--acc);cursor:pointer}
#drawer-assess-row label{font-size:12px;color:var(--txt);cursor:pointer;white-space:nowrap}
#drawer-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.d-btn{height:34px;padding:0 16px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);border:1px solid var(--border2);background:var(--bg3);color:var(--txt);transition:background .12s}
.d-btn:hover{background:var(--bg4)}
.d-btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.d-btn.primary:hover{opacity:.87}

/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:confetti-fall linear forwards}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* TOAST / NOTIF */
#toast{position:fixed;bottom:28px;right:28px;background:var(--txt);color:var(--bg2);font-size:12px;font-family:var(--font);font-weight:500;padding:8px 16px;border-radius:20px;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .2s,transform .2s;z-index:999}
#toast.show{opacity:1;transform:translateY(0)}
#notif-banner{display:none;background:var(--acc2);border-bottom:1px solid rgba(108,63,197,.2);padding:7px 24px;font-size:12px;color:var(--acc);font-weight:500;align-items:center;gap:8px;flex-shrink:0}
#notif-banner.show{display:flex}
#notif-dismiss{background:none;border:none;cursor:pointer;color:var(--acc);font-size:16px;margin-left:auto;padding:0 4px;font-family:var(--font)}

/* DARK/LIGHT QUICK TOGGLE */
#dark-toggle{font-size:15px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* mobile */
#mob-sidebar-btn{display:none;background:none;border:none;cursor:pointer;font-size:20px;padding:0 10px;color:var(--txt);height:100%}
@media(max-width:820px){
  #mob-sidebar-btn{display:flex;align-items:center}
  #sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:300;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow-lg)}
  #sidebar.mob-open{transform:translateX(0)}
  #sidebar-overlay{display:none;position:fixed;inset:0;top:52px;background:rgba(0,0,0,.3);z-index:299}
  #sidebar-overlay.show{display:block}
  #cal-side{display:none}
  #drawer-grid{grid-template-columns:1fr 1fr}
  .nav-tab-label{display:none}
  .preset-grid{grid-template-columns:repeat(3,1fr)}
}
</style>

// ════ STORAGE ════
const _mem={};
function lsOk(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true}catch{return false}}
const LS=lsOk();
function load(k,def){try{const r=LS?localStorage.getItem(k):_mem[k];return r!=null?JSON.parse(r):def}catch{return def}}
function store(k,v){try{const s=JSON.stringify(v);LS?localStorage.setItem(k,s):(_mem[k]=s)}catch{}}

const SC=['#e05c5c','#e07c3a','#d4a820','#5aac50','#3aabab','#5c7be0','#9b5ce0','#e05ca0','#6b7280'];
const DS=[{id:'s1',name:'Maths',color:'#5c7be0'},{id:'s2',name:'English',color:'#5aac50'},{id:'s3',name:'Science',color:'#3aabab'}];

let subjects  = load('hw_subjects', DS);
let tasks     = load('hw_tasks',    []);

// ════ UTILS ════
function todayStr(){return new Date().toISOString().slice(0,10)}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)}
function daysUntil(due){return Math.round((new Date(due)-new Date(todayStr()))/864e5)}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtShort(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'})}
function fmtLong(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function hexRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function timeAgo(ds){const d=daysUntil(ds);if(d===0)return'today';if(d===-1)return'yesterday';if(d<0)return`${Math.abs(d)} days ago`;return''}
function dueInfo(due){
  const d=daysUntil(due);
  if(d<0)  return{text:'Overdue',cls:'due-red'};
  if(d===0)return{text:'Due today',cls:'due-red'};
  if(d===1)return{text:'Due tomorrow',cls:'due-yellow'};
  if(d<=3) return{text:`Due in ${d} days`,cls:'due-yellow'};
  return       {text:`Due in ${d} days`,cls:'due-green'};
}
function highlight(text,q){
  if(!q)return escH(text);
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return escH(text).replace(re,'<mark class="hl">$1</mark>');
}
function gradeInfo(pct){
  if(pct>=90)return{label:'A+',bg:'#e8f5e9',color:'#1b5e20'};
  if(pct>=80)return{label:'A', bg:'#e8f5e9',color:'#2e7d32'};
  if(pct>=70)return{label:'B', bg:'#e8f5e9',color:'#388e3c'};
  if(pct>=60)return{label:'C', bg:'#fef9e7',color:'#8a6d00'};
  if(pct>=50)return{label:'D', bg:'#fef9e7',color:'#a05000'};
  return             {label:'F', bg:'#fdecea',color:'#c0392b'};
}
function priorityBadge(p){
  if(p==='high')  return'<span class="priority-badge p-high">↑ High</span>';
  if(p==='medium')return'<span class="priority-badge p-medium">→ Medium</span>';
  if(p==='low')   return'<span class="priority-badge p-low">↓ Low</span>';
  return'';
}

function launchConfetti(){
  const colors=['#6c3fc5','#5aac50','#e05c5c','#d4a820','#3aabab','#e05ca0'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;
      animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;
      border-radius:${Math.random()>0.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(3+Math.random()*2)*1000);
  }
}

// ════ STREAK ════
function updateStreak(){
  const td=todayStr();
  const doneTasks=tasks.filter(t=>t.done&&t.completedAt===td);
  if(doneTasks.length>0){
    if(streakData.date===td){/* already counted */}
    else{
      const yesterday=new Date(td);yesterday.setDate(yesterday.getDate()-1);
      const yStr=yesterday.toISOString().slice(0,10);
      streakData.streak=(streakData.date===yStr||streakData.date===td)?streakData.streak+1:1;
      streakData.date=td;
      store('hw_streak',streakData);
    }
  }
  const el=document.getElementById('streak-text');
  if(el)el.textContent=`${streakData.streak} day streak`;
}

// ════ THEME ENGINE ════
const PRESETS=[
  {id:'warm',    name:'Warm',     bg:'#f7f6f3',bg2:'#ffffff',bg3:'#eeecea',txt:'#1c1b19',h:260,s:60,l:50,dark:false},
  {id:'dark',    name:'Dark',     bg:'#141412',bg2:'#1e1d1b',bg3:'#252420',txt:'#f0ede8',h:260,s:55,l:65,dark:true},
  {id:'ocean',   name:'Ocean',    bg:'#e8f4f8',bg2:'#ffffff',bg3:'#d6ecf3',txt:'#0d2d3a',h:200,s:70,l:38,dark:false},
  {id:'deep',    name:'Deep Sea', bg:'#081e2a',bg2:'#0e2d3e',bg3:'#133549',txt:'#d0eaf5',h:195,s:80,l:55,dark:true},
  {id:'rose',    name:'Rose',     bg:'#fdf5f7',bg2:'#ffffff',bg3:'#f7e8ed',txt:'#2a0d17',h:345,s:65,l:48,dark:false},
  {id:'forest',  name:'Forest',   bg:'#f0f5ef',bg2:'#ffffff',bg3:'#e2ede0',txt:'#0e2010',h:125,s:55,l:35,dark:false},
  {id:'slate',   name:'Midnight', bg:'#1a1f2e',bg2:'#222736',bg3:'#2a3045',txt:'#e2e6f0',h:225,s:75,l:65,dark:true},
  {id:'peach',   name:'Peach',    bg:'#fff8f4',bg2:'#ffffff',bg3:'#ffeee6',txt:'#2d1000',h:22, s:70,l:47,dark:false},
  {id:'mono',    name:'Mono',     bg:'#f8f8f8',bg2:'#ffffff',bg3:'#efefef',txt:'#111111',h:0,  s:0, l:20,dark:false},
  {id:'lavender',name:'Lavender', bg:'#f5f3ff',bg2:'#ffffff',bg3:'#ede9fe',txt:'#1e1440',h:255,s:65,l:52,dark:false},
];
function hslHex(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};return`#${f(0)}${f(8)}${f(4)}`}
function ldar(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,Math.max(0,r+amt));g=Math.min(255,Math.max(0,g+amt));b=Math.min(255,Math.max(0,b+amt));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`}
function applyTheme(ts){
  const p=PRESETS.find(x=>x.id===ts.preset)||PRESETS[0];
  const acc=hslHex(ts.h,ts.s,ts.dark?Math.min(ts.l+15,85):ts.l);
  const accL=hslHex(ts.h,Math.max(ts.s-20,10),ts.dark?Math.max(ts.l-20,20):Math.min(ts.l+35,95));
  const rv=document.documentElement;
  rv.style.setProperty('--bg',p.bg);rv.style.setProperty('--bg2',p.bg2);rv.style.setProperty('--bg3',p.bg3);
  rv.style.setProperty('--bg4',ldar(p.bg3,ts.dark?-10:-5));
  rv.style.setProperty('--txt',p.txt);rv.style.setProperty('--txt2',ts.dark?'#8a8784':'#6b6966');rv.style.setProperty('--txt3',ts.dark?'#5a5855':'#9c9895');
  rv.style.setProperty('--border',ts.dark?'rgba(255,255,255,0.09)':'rgba(0,0,0,0.09)');rv.style.setProperty('--border2',ts.dark?'rgba(255,255,255,0.16)':'rgba(0,0,0,0.16)');
  rv.style.setProperty('--acc',acc);rv.style.setProperty('--acc2',accL+'33');
  rv.style.setProperty('--shadow',ts.dark?'0 2px 16px rgba(0,0,0,.3)':'0 2px 16px rgba(0,0,0,.07)');
  rv.style.setProperty('--shadow-lg',ts.dark?'0 8px 40px rgba(0,0,0,.45)':'0 8px 40px rgba(0,0,0,.13)');
  if(ts.dark){rv.style.setProperty('--red-bg','#2d1515');rv.style.setProperty('--red','#e07070');rv.style.setProperty('--yellow-bg','#2a2310');rv.style.setProperty('--yellow','#d4a830');rv.style.setProperty('--green-bg','#0f2410');rv.style.setProperty('--green','#6abf6a');}
  else{rv.style.setProperty('--red-bg','#fdecea');rv.style.setProperty('--red','#c0392b');rv.style.setProperty('--yellow-bg','#fef9e7');rv.style.setProperty('--yellow','#8a6d00');rv.style.setProperty('--green-bg','#eaf5ea');rv.style.setProperty('--green','#276227');}
  document.getElementById('dark-toggle').textContent=ts.dark?'☀️':'🌙';
}

// Dark/light quick toggle
document.getElementById('dark-toggle').onclick=()=>{
  themeStore.dark=!themeStore.dark;
  // find matching dark/light pair
  const darkPairs={warm:'dark',dark:'warm',ocean:'deep','deep':'ocean',rose:'slate',forest:'slate',slate:'forest',peach:'dark',mono:'dark',lavender:'dark'};
  if(themeStore.dark){const dp=darkPairs[themeStore.preset];if(dp)themeStore.preset=dp;}
  else{const lp=Object.entries(darkPairs).find(([k,v])=>v===themeStore.preset);if(lp)themeStore.preset=lp[0];}

function openThemePicker(){
  let ts={...themeStore};
  function previewAcc(){return hslHex(ts.h,ts.s,ts.dark?Math.min(ts.l+15,85):ts.l)}
  function previewAccL(){return hslHex(ts.h,Math.max(ts.s-20,10),ts.dark?Math.max(ts.l-20,20):Math.min(ts.l+35,95))}
  const presetCards=PRESETS.map(p=>`
    <div class="preset-card${p.id===ts.preset?' active':''}" data-pid="${p.id}"
      style="--pp-s:${p.bg3};--pp-m:${p.bg};--pp-a:${hslHex(p.h,p.s,p.dark?Math.min(p.l+15,85):p.l)};--pp-t:${p.txt}">
      <div class="preset-preview">
        <div class="pp-s" style="background:var(--pp-s)"></div>
        <div class="pp-m" style="background:var(--pp-m)">
          <div class="pp-bar" style="background:var(--pp-a);width:70%"></div>
          <div class="pp-bar" style="background:var(--pp-t);width:85%"></div>
          <div class="pp-bar" style="background:var(--pp-t);width:55%"></div>
        </div>
      </div>
      <div class="preset-name">${p.name}</div>
    </div>`).join('');
  showModal(`<div class="modal-title">🎨 Colour Scheme</div>
    <div class="theme-modal-body">
      <div>
        <div class="theme-section-label">Base Theme</div>
        <div class="preset-grid" id="preset-grid">${presetCards}</div>
      </div>
      <div>
        <div class="theme-section-label">Accent Colour — drag the sliders</div>
        <div class="spectrum-wrap">
          <div class="spectrum-row">
            <span class="spectrum-label">Hue</span>
            <div class="spectrum-track" id="hue-track" style="background:linear-gradient(to right,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000)"><div class="spectrum-thumb" id="hue-thumb"></div></div>
          </div>
          <div class="spectrum-row">
            <span class="spectrum-label">Saturation</span>
            <div class="spectrum-track" id="sat-track"><div class="spectrum-thumb" id="sat-thumb"></div></div>
          </div>
          <div class="spectrum-row">
            <span class="spectrum-label">Lightness</span>
            <div class="spectrum-track" id="lit-track"><div class="spectrum-thumb" id="lit-thumb"></div></div>
          </div>
          <div class="spectrum-preview-box" id="spv-box">
            <div class="spv-swatch-row" id="spv-swatches"></div>
            <div id="spv-label" style="font-size:11px;opacity:.6"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-btns"><button class="modal-btn" id="th-cancel">Cancel</button><button class="modal-btn primary" id="th-apply">Apply</button></div>`);

  function updateSliderBgs(){
    document.getElementById('sat-track').style.background=`linear-gradient(to right,${hslHex(ts.h,0,50)},${hslHex(ts.h,100,50)})`;
    document.getElementById('lit-track').style.background=`linear-gradient(to right,${hslHex(ts.h,ts.s,0)},${hslHex(ts.h,ts.s,50)},${hslHex(ts.h,ts.s,100)})`;
  }
  function positionThumbs(){
    document.getElementById('hue-thumb').style.left=(ts.h/360*100)+'%';
    document.getElementById('sat-thumb').style.left=ts.s+'%';
    document.getElementById('lit-thumb').style.left=ts.l+'%';
  }
  function updatePreview(){
    const acc=previewAcc(),accL=previewAccL();
    document.getElementById('spv-box').style.background=accL+'22';
    document.getElementById('spv-swatches').innerHTML=
      `<div class="spv-swatch" style="background:${acc}"></div>
       <div class="spv-swatch" style="background:${acc}55;border:2px solid ${acc}44"></div>
       <div class="spv-swatch" style="background:${accL}33;border-radius:50%"></div>`;
    document.getElementById('spv-label').textContent=`${acc.toUpperCase()} · H:${ts.h}° S:${ts.s}% L:${ts.l}%`;
    updateSliderBgs();positionThumbs();applyTheme(ts);
  }
  function makeDraggable(tid,thid,onVal){
    const track=document.getElementById(tid),thumb=document.getElementById(thid);
    function set(e){const rect=track.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX;onVal(Math.min(1,Math.max(0,(cx-rect.left)/rect.width)));updatePreview();}
    thumb.addEventListener('mousedown',e=>{e.preventDefault();const mm=ev=>set(ev);const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
    track.addEventListener('click',set);
    thumb.addEventListener('touchstart',e=>{const tm=ev=>{e.preventDefault();set(ev)};const tu=()=>{document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',tu)};document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',tu);});
  }
  makeDraggable('hue-track','hue-thumb',p=>{ts.h=Math.round(p*360)});
  makeDraggable('sat-track','sat-thumb',p=>{ts.s=Math.round(p*100)});
  makeDraggable('lit-track','lit-thumb',p=>{ts.l=Math.round(p*100)});
  document.querySelectorAll('.preset-card').forEach(el=>{
    el.addEventListener('click',()=>{
      ts.preset=el.dataset.pid;const p=PRESETS.find(x=>x.id===ts.preset);ts.h=p.h;ts.s=p.s;ts.l=p.l;ts.dark=p.dark;
      document.querySelectorAll('.preset-card').forEach(x=>x.classList.remove('active'));el.classList.add('active');
      updatePreview();
    });
  });
  updatePreview();
  document.getElementById('th-cancel').onclick=()=>{applyTheme(themeStore);closeModal();};
  document.getElementById('th-apply').onclick=()=>{themeStore={...ts};saveTheme();applyTheme(themeStore);closeModal();showToast('✓ Theme saved');};
}

// ════ NOTIFICATIONS ════
function checkNotifications(){
  const td=tasks.filter(t=>!t.done&&t.dueDate===todayStr());
  const tm=tasks.filter(t=>!t.done&&t.dueDate===tomorrowStr());
  const msgs=[];
  if(td.length)msgs.push(`${td.length} task${td.length>1?'s':''} due today`);
  if(tm.length)msgs.push(`${tm.length} task${tm.length>1?'s':''} due tomorrow`);
  const b=document.getElementById('notif-banner');
  if(msgs.length){document.getElementById('notif-text').textContent='🔔 '+msgs.join(' · ');b.classList.add('show');}
  else b.classList.remove('show');
}

function renderSidebar(){
  const list=document.getElementById('subject-list');
  const allCount=tasks.filter(t=>!t.done).length;
  let html=`<div class="subj-item${activeSubject==='all'?' active':''}" data-sid="all">
    <div class="subj-dot" style="background:var(--txt3)"></div>
    <span class="subj-name">All Subjects</span>
    <span class="subj-count">${allCount}</span>
  </div>`;
  subjects.forEach(s=>{
    const cnt=tasks.filter(t=>t.subjectId===s.id&&!t.done).length;
    html+=`<div class="subj-item${activeSubject===s.id?' active':''}" data-sid="${s.id}">
      <div class="subj-dot" style="background:${s.color}"></div>
      <span class="subj-name">${escH(s.name)}</span>
      <span class="subj-count">${cnt}</span>
      <div class="subj-actions">
        <button class="subj-act-btn" data-rename="${s.id}">✎</button>
        <button class="subj-act-btn" data-del="${s.id}">✕</button>
      </div>
    </div>`;
  });
  list.innerHTML=html;
  const sb=document.getElementById('sidebar'),hd=document.getElementById('sidebar-top'),ab=document.getElementById('add-subj-btn');
  if(activeSubject!=='all'){
    const s=subjects.find(x=>x.id===activeSubject);
    if(s){sb.style.background=hexRgba(s.color,.15);hd.style.color=s.color;ab.style.borderColor=hexRgba(s.color,.4);ab.style.color=s.color;}
  }else{sb.style.background='';hd.style.color='';ab.style.borderColor='';ab.style.color='';}
  list.querySelectorAll('.subj-item[data-sid]').forEach(el=>{
    el.addEventListener('click',e=>{if(e.target.closest('[data-rename],[data-del]'))return;activeSubject=el.dataset.sid;renderAll();document.getElementById('sidebar').classList.remove('mob-open');document.getElementById('sidebar-overlay').classList.remove('show');});

  list.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();confirmDeleteSubject(el.dataset.del);}));

}

  document.querySelectorAll('#cr .cswatch').forEach(sw=>sw.addEventListener('click',()=>{sel=sw.dataset.c;document.querySelectorAll('#cr .cswatch').forEach(x=>x.classList.remove('sel'));sw.classList.add('sel');}));
  document.getElementById('ss').onclick=()=>{const n=inp.value.trim();if(!n)return;subjects.push({id:'s'+uid(),name:n,color:sel});saveAll();closeModal();renderAll();};
}

// ════ TASKS ════
function sorted(arr){return[...arr].sort((a,b)=>{const pa={high:0,medium:1,low:2,none:3};const pdiff=(pa[a.priority]||3)-(pa[b.priority]||3);if(pdiff!==0)return pdiff;return a.dueDate<b.dueDate?-1:a.dueDate>b.dueDate?1:0})}

function filterTasks(){
  let t=tasks;
  if(activeSubject!=='all')t=t.filter(x=>x.subjectId===activeSubject);
  if(searchQ){const q=searchQ.toLowerCase();t=t.filter(x=>x.title.toLowerCase().includes(q)||(x.notes||'').toLowerCase().includes(q));}
  if(activeTab==='completed')return sorted(t.filter(x=>x.done));
  if(activeTab==='today')return sorted(t.filter(x=>!x.done&&(x.dueDate===todayStr()||x.dueDate===tomorrowStr())));
  return sorted(t.filter(x=>!x.done));
}

function taskCard(t){
  const subj=subjects.find(s=>s.id===t.subjectId)||{name:'?',color:'#9c9895'};
  const due=dueInfo(t.dueDate);
  const smart=!t.done&&daysUntil(t.dueDate)>=2&&daysUntil(t.dueDate)<=4;
  const isOv=!t.done&&daysUntil(t.dueDate)<0;
  const bg=hexRgba(subj.color,.13);
  const compAt=t.done&&t.completedAt?`Completed ${timeAgo(t.completedAt)||fmtShort(t.completedAt)}`:'';
  const gi=t.done&&t.grade!=null?gradeInfo(t.grade):null;
  const timeEst=t.timeEst?`<span class="time-badge">⏱ ${t.timeEst}h</span>`:'';
  return `<div class="hw-card${isOv?' overdue-card':''}${t.isAssessment?' assessment-card':(t.priority==='high'?' high-priority':'')}">
    <div class="hw-check${t.done?' checked':''}" data-chk="${t.id}"></div>
    <div class="hw-body">
      <div class="hw-top">
        <div class="hw-title-wrap">
          <div class="hw-title${t.done?' done':''}">${t.isAssessment?'⚠️ ':''}${highlight(t.title,searchQ)}</div>
          ${t.notes?`<div class="hw-notes">${highlight(t.notes,searchQ)}</div>`:''}
        </div>
        <div class="hw-actions">
          <button class="hw-act" data-edit="${t.id}" title="Edit">✎</button>
          <button class="hw-act" data-rm="${t.id}" title="Delete">✕</button>
        </div>
      </div>
      <div class="hw-meta">
        <span class="hw-subj-tag" style="background:${bg};color:${subj.color}">${escH(subj.name)}</span>
        ${!t.done?`<span class="hw-due-badge ${due.cls}">${due.text}</span>`:''}
        ${t.isAssessment?'<span class="assess-badge">📄 Assessment</span>':''}
        ${t.priority&&t.priority!=='none'?priorityBadge(t.priority):''}
        ${timeEst}
        <span class="hw-date-txt">${fmtShort(t.dueDate)}</span>
        ${smart?'<span class="hw-smart">✦ Start today</span>':''}
        ${compAt?`<span class="hw-completed-at">${compAt}</span>`:''}
        ${gi?`<span class="grade-badge" style="background:${gi.bg};color:${gi.color}">${t.grade}% · ${gi.label}</span>`:''}
      </div>
    </div>
  </div>`;
}

function section(label,count,html){return`<div class="section-hd"><span class="section-hd-label">${label}</span><div class="section-hd-line"></div><span class="section-hd-count">${count}</span></div>${html}`}

function renderContent(){
  const area=document.getElementById('content-area');
  const f=filterTasks();
  if(activeTab==='all'){
    const ov=f.filter(t=>daysUntil(t.dueDate)<0);
    const ug=f.filter(t=>t.dueDate===todayStr()||t.dueDate===tomorrowStr());
    const wk=f.filter(t=>daysUntil(t.dueDate)>1&&daysUntil(t.dueDate)<=7);
    const lt=f.filter(t=>daysUntil(t.dueDate)>7);
    if(!f.length){area.innerHTML=`<div class="empty-state"><div class="e-icon">📭</div><div class="e-title">${searchQ?'No tasks match':'No tasks yet'}</div><div class="e-sub">${searchQ?'Try a different term':'Click "+ Add Homework" above'}</div></div>`;bindCards();return;}
    let h='';
    if(ov.length)h+=section('🔴 Overdue',ov.length,ov.map(taskCard).join(''));
    if(ug.length)h+=section('⚡ Due Very Soon',ug.length,ug.map(taskCard).join(''));
    if(wk.length)h+=section('📌 This Week',wk.length,wk.map(taskCard).join(''));
    if(lt.length)h+=section('📆 Upcoming',lt.length,lt.map(taskCard).join(''));
    area.innerHTML=h;
  }else if(activeTab==='today'){
    if(!f.length){area.innerHTML=`<div class="empty-state"><div class="e-icon">🎉</div><div class="e-title">All clear!</div><div class="e-sub">Nothing due today or tomorrow.</div></div>`;bindCards();return;}
    const td=f.filter(t=>t.dueDate===todayStr()),tm=f.filter(t=>t.dueDate===tomorrowStr());
    let h='';
    if(td.length)h+=section('Due Today',td.length,td.map(taskCard).join(''));
    if(tm.length)h+=section('Due Tomorrow',tm.length,tm.map(taskCard).join(''));
    area.innerHTML=h;
  }else{
    if(!f.length){area.innerHTML=`<div class="empty-state"><div class="e-icon">✅</div><div class="e-title">Nothing completed yet</div></div>`;bindCards();return;}
    area.innerHTML=section('Completed',f.length,f.map(taskCard).join(''));
  }
  bindCards();
}

function bindCards(){
  const area=document.getElementById('content-area');
  area.querySelectorAll('[data-chk]').forEach(el=>el.addEventListener('click',()=>{
    const t=tasks.find(x=>x.id===el.dataset.chk);if(!t)return;
    if(!t.done){
      if(t.isAssessment){askForGrade(t);}
      else{t.done=true;t.completedAt=todayStr();saveAll();renderAll();launchConfetti();updateStreak();}
    }else{t.done=false;delete t.completedAt;delete t.grade;saveAll();renderAll();}
  }));
  area.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click',()=>openEditModal(el.dataset.edit)));
  area.querySelectorAll('[data-rm]').forEach(el=>el.addEventListener('click',()=>{tasks=tasks.filter(x=>x.id!==el.dataset.rm);saveAll();renderAll();}));
}

// ════ GRADE PROMPT ════
function askForGrade(t){
  const subj=subjects.find(s=>s.id===t.subjectId)||{name:'?'};
  showModal(`<div class="modal-title">✅ Assessment Complete!</div>
    <p style="font-size:13px;color:var(--txt2);margin-bottom:14px"><strong>${escH(t.title)}</strong> — ${escH(subj.name)}<br>What percentage did you score?</p>
    <div class="modal-field">
      <label class="modal-label">Score (%)</label>
      <input class="modal-input grade-input-big" type="number" id="grade-in" min="0" max="100" placeholder="e.g. 84"/>
      <div class="grade-preview" id="grade-preview"></div>
    </div>
    <div class="modal-btns"><button class="modal-btn" id="g-skip">Skip</button><button class="modal-btn primary" id="g-save">Save & Complete</button></div>`);
  const inp=document.getElementById('grade-in'),prev=document.getElementById('grade-preview');
  inp.focus();
  inp.addEventListener('input',()=>{const v=parseInt(inp.value);if(isNaN(v)||v<0||v>100){prev.style.background='';prev.textContent='';return;}const gi=gradeInfo(v);prev.style.background=gi.bg;prev.style.color=gi.color;prev.textContent=`${v}% — Grade ${gi.label}`;});
  function complete(grade){
    t.done=true;t.completedAt=todayStr();if(grade!=null)t.grade=grade;
    saveAll();closeModal();renderAll();launchConfetti();updateStreak();
    const done=tasks.filter(x=>x.subjectId===t.subjectId&&x.done&&x.isAssessment&&x.grade!=null);
    if(done.length>=2){const avg=Math.round(done.reduce((s,x)=>s+x.grade,0)/done.length);const gi=gradeInfo(avg);showToast(`📊 ${escH(subj.name)} avg: ${avg}% (${gi.label})`);}
  }
  document.getElementById('g-skip').onclick=()=>complete(null);
  document.getElementById('g-save').onclick=()=>{const v=parseInt(inp.value);complete(isNaN(v)||v<0||v>100?null:v);};
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('g-save').click();});
}

// ════ AVERAGES ════
function renderAverages(){
  const panel=document.getElementById('avg-panel');
  const at=tasks.filter(t=>t.isAssessment&&t.done&&t.grade!=null);
  if(!at.length){panel.innerHTML=`<div class="empty-state"><div class="e-icon">📊</div><div class="e-title">No graded assessments yet</div><div class="e-sub">Complete assessments and enter your score to see averages here.</div></div>`;return;}
  let html='<div class="avg-grid">';
  subjects.forEach(s=>{
    const done=at.filter(t=>t.subjectId===s.id);if(!done.length)return;
    // weighted average if weights set
    const totalWeight=done.reduce((a,t)=>a+(t.weight||1),0);
    const wavg=Math.round(done.reduce((a,t)=>a+t.grade*(t.weight||1),0)/totalWeight);
    const gi=gradeInfo(wavg);
    const target=subjectTargets[s.id]||null;
    const barColor=wavg>=70?'var(--green)':wavg>=50?'var(--yellow)':'var(--red)';
    // trend: compare last 2 assessments
    let trendIcon='';
    if(done.length>=2){
      const sorted2=[...done].sort((a,b)=>a.completedAt<b.completedAt?-1:1);
      const diff=sorted2[sorted2.length-1].grade-sorted2[sorted2.length-2].grade;
      trendIcon=diff>0?'<span style="color:var(--green)">↑ Improving</span>':diff<0?'<span style="color:var(--red)">↓ Declining</span>':'<span style="color:var(--txt3)">→ Steady</span>';
    }
    const histRows=done.slice().sort((a,b)=>b.completedAt<a.completedAt?-1:1).map(t=>{
      const tgi=gradeInfo(t.grade);
      return`<div class="avg-hist-row">
        <span class="avg-hist-name">${escH(t.title)}</span>
        ${t.weight&&t.weight!==1?`<span class="avg-hist-weight">×${t.weight}</span>`:''}
        <span class="avg-hist-score" style="color:${tgi.color}">${t.grade}%</span>
        <span class="avg-hist-date">${fmtShort(t.dueDate)}</span>
      </div>`;}).join('');
    const targetLine=target?`<div class="avg-target-line" style="left:${target}%"></div>`:'';
    html+=`<div class="avg-card">
      <div class="avg-card-top">
        <div class="avg-dot" style="background:${s.color}"></div>
        <span class="avg-subj-name">${escH(s.name)}</span>
        <span class="avg-trend">${trendIcon}</span>
      </div>
      <div class="avg-target-row">
        <span>Target:</span>
        <input class="avg-target-input" type="number" min="0" max="100" placeholder="—" value="${target||''}" data-subj="${s.id}"/>
        <span>%</span>
        <span style="margin-left:4px;font-size:11px">${done.length} assessment${done.length>1?'s':''}</span>
      </div>
      <div class="avg-score-row">
        <span class="avg-score" style="color:${gi.color}">${wavg}</span>
        <span class="avg-score-pct">%</span>
        <span class="avg-grade-lbl" style="background:${gi.bg};color:${gi.color}">${gi.label}</span>
      </div>
      <div class="avg-bar-wrap"><div class="avg-bar" style="width:${wavg}%;background:${barColor}">${targetLine}</div></div>
      <div class="avg-history"><div class="avg-history-title">Assessment history</div>${histRows}</div>
    </div>`;
  });
  html+='</div>';
  panel.innerHTML=html;
  panel.querySelectorAll('.avg-target-input').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const v=parseInt(inp.value);
      subjectTargets[inp.dataset.subj]=isNaN(v)?null:Math.min(100,Math.max(0,v));
      saveTargets();renderAverages();
    });
  });
}

      <div class="modal-field"><label class="modal-label">Time estimate (hrs)</label><input class="modal-input" type="number" id="etime" min="0.5" max="20" step="0.5" value="${t.timeEst||''}" placeholder="e.g. 2"/></div>
    </div>
    ${t.done&&t.isAssessment?`<div class="modal-row"><div class="modal-field"><label class="modal-label">Grade (%)</label><input class="modal-input" type="number" id="eg" min="0" max="100" value="${t.grade??''}"/></div>${t.isAssessment?`<div class="modal-field"><label class="modal-label">Weight (×1 = normal)</label><input class="modal-input" type="number" id="ew" min="0.1" max="10" step="0.1" value="${t.weight||1}"/></div>`:''}</div>`:''}
    ${t.isAssessment&&!t.done?`<div class="modal-row"><div class="modal-field"><label class="modal-label">Weight (×1 = normal)</label><input class="modal-input" type="number" id="ew" min="0.1" max="10" step="0.1" value="${t.weight||1}"/></div><div></div></div>`:''}
    <div class="modal-check-row"><input type="checkbox" id="ea" ${t.isAssessment?'checked':''}/><label for="ea">⚠️ Mark as Assessment</label></div>
    <div class="modal-btns"><button class="modal-btn" id="ec">Cancel</button><button class="modal-btn primary" id="es2">Save</button></div>`);
  document.getElementById('ec').onclick=closeModal;

  document.getElementById('es2').onclick=()=>{

// ════ CALENDAR ════
function calDs(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function eventsForDay(ds){
  const hw=tasks.filter(t=>t.dueDate===ds).map(t=>({id:t.id,name:t.title,color:(subjects.find(s=>s.id===t.subjectId)||{color:'#9c9895'}).color,type:'hw',isAssessment:t.isAssessment,done:t.done}));
  const ce=calEvents.filter(e=>e.date===ds).map(e=>({id:e.id,name:e.title,color:e.color,type:'custom'}));
  return[...hw,...ce];
}
function renderCalendar(){
  const M=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-lbl').textContent=`${M[calMonth]} ${calYear}`;
  document.getElementById('cal-week-btn').classList.toggle('active',calWeekView);
  if(calWeekView){renderWeekView();return;}
  document.getElementById('cal-dow-row').style.display='';
  const first=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate(),td=todayStr();
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=calDs(calYear,calMonth,d),evs=eventsForDay(ds);
    const pills=evs.slice(0,3).map(e=>`<span class="cal-pill" style="background:${hexRgba(e.color,.18)};color:${e.color}">${e.isAssessment?'⚠️':''}${escH(e.name)}</span>`).join('');
    const more=evs.length>3?`<div class="cal-more">+${evs.length-3} more</div>`:'';
    html+=`<div class="cal-day${ds===td?' today':''}${ds===selectedCalDay?' selected':''}" data-date="${ds}"><div class="cal-day-num"><span class="ni">${d}</span></div>${pills}${more}</div>`;
  }
  document.getElementById('cal-days').innerHTML=`<div class="cal-days" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${html}</div>`;
  document.querySelectorAll('.cal-day[data-date]').forEach(el=>el.addEventListener('click',()=>{selectedCalDay=el.dataset.date;renderCalendar();renderCalSide();}));
  if(selectedCalDay)renderCalSide();
}
function renderWeekView(){
  document.getElementById('cal-dow-row').style.display='none';
  const td=todayStr();
  // find start of week containing selectedCalDay or today
  const ref=selectedCalDay?new Date(selectedCalDay+'T00:00:00'):new Date(td+'T00:00:00');
  const startOfWeek=new Date(ref);startOfWeek.setDate(ref.getDate()-ref.getDay());
  let html='<div class="cal-week-grid">';
  for(let i=0;i<7;i++){
    const d=new Date(startOfWeek);d.setDate(startOfWeek.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const evs=eventsForDay(ds);
    const pills=evs.map(e=>`<div class="cal-week-pill" style="background:${hexRgba(e.color,.18)};color:${e.color}">${e.isAssessment?'⚠️':''}${escH(e.name)}</div>`).join('');
    const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    html+=`<div class="cal-week-col" data-date="${ds}">
      <div class="cal-week-hd">
        <div class="cal-week-hd-day">${dows[d.getDay()]}</div>
        <div class="cal-week-hd-num${ds===td?' today-num':''}">${d.getDate()}</div>
      </div>
      <div class="cal-week-events">${pills}</div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('cal-days').innerHTML=html;
  document.querySelectorAll('.cal-week-col[data-date]').forEach(el=>el.addEventListener('click',()=>{selectedCalDay=el.dataset.date;renderCalSide();}));
}
function renderCalSide(){
  const evs=eventsForDay(selectedCalDay);
  document.getElementById('cal-side-title').textContent=fmtLong(selectedCalDay);
  document.getElementById('cal-side-count').textContent=evs.length?`${evs.length} event${evs.length>1?'s':''}`:' ';
  const c=document.getElementById('cal-side-events');
  if(!evs.length){c.innerHTML=`<div style="padding:18px 0;font-size:13px;color:var(--txt3);text-align:center">No events.<br><br><button class="modal-btn primary" onclick="openAddCalEventModal('${selectedCalDay}')" style="font-size:12px;padding:7px 14px">+ Add Event</button></div>`;return;}
  c.innerHTML=evs.map(e=>`<div class="cal-ev-row">
    <div class="cal-ev-dot" style="background:${e.color}"></div>
    <div class="cal-ev-body"><div class="cal-ev-name">${e.isAssessment?'⚠️ ':''}${escH(e.name)}${e.done?' ✓':''}</div><div class="cal-ev-type">${e.type==='hw'?'📚 Homework':'📌 Event'}</div></div>
    ${e.type==='custom'?`<button class="cal-ev-del" data-evdel="${e.id}">✕</button>`:''}
  </div>`).join('');
  c.querySelectorAll('[data-evdel]').forEach(el=>el.addEventListener('click',()=>{calEvents=calEvents.filter(x=>x.id!==el.dataset.evdel);saveAll();renderCalSide();renderCalendar();}));
}

  const dv=prefill||selectedCalDay||todayStr();
  let sel=SC[5];
  showModal(`<div class="modal-title">Add Calendar Event</div>
    <div class="modal-field"><label class="modal-label">Title</label><input class="modal-input" type="text" id="cet" placeholder="e.g. Study session…"/></div>

      <div class="modal-field"><label class="modal-label">Colour</label><div class="color-row" id="cec-row" style="margin-top:8px">${SC.map((c,i)=>`<div class="cswatch${i===5?' sel':''}" style="background:${c}" data-c="${c}"></div>`).join('')}</div></div>
    </div>
    <div class="modal-btns"><button class="modal-btn" id="cec">Cancel</button><button class="modal-btn primary" id="ces">Add Event</button></div>`);
  document.getElementById('cet').focus();
  document.getElementById('cec').onclick=closeModal;
  document.querySelectorAll('#cec-row .cswatch').forEach(sw=>sw.addEventListener('click',()=>{sel=sw.dataset.c;document.querySelectorAll('#cec-row .cswatch').forEach(x=>x.classList.remove('sel'));sw.classList.add('sel');}));
  document.getElementById('ces').onclick=()=>{const title=document.getElementById('cet').value.trim(),date=document.getElementById('ced').value;if(!title||!date)return;calEvents.push({id:'ce'+uid(),title,date,color:sel});selectedCalDay=date;saveAll();closeModal();renderCalendar();renderCalSide();};
}
document.getElementById('cal-prev').onclick=()=>{if(calWeekView){const ref=selectedCalDay?new Date(selectedCalDay+'T00:00:00'):new Date();ref.setDate(ref.getDate()-7);selectedCalDay=ref.toISOString().slice(0,10);calYear=ref.getFullYear();calMonth=ref.getMonth();}else{calMonth--;if(calMonth<0){calMonth=11;calYear--;}}renderCalendar();};
document.getElementById('cal-next').onclick=()=>{if(calWeekView){const ref=selectedCalDay?new Date(selectedCalDay+'T00:00:00'):new Date();ref.setDate(ref.getDate()+7);selectedCalDay=ref.toISOString().slice(0,10);calYear=ref.getFullYear();calMonth=ref.getMonth();}else{calMonth++;if(calMonth>11){calMonth=0;calYear++;}}renderCalendar();};
document.getElementById('cal-today-btn').onclick=()=>{const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();selectedCalDay=todayStr();renderCalendar();};
document.getElementById('cal-week-btn').onclick=()=>{calWeekView=!calWeekView;if(calWeekView&&!selectedCalDay)selectedCalDay=todayStr();renderCalendar();};
document.getElementById('cal-add-event-btn').onclick=()=>openAddCalEventModal();

// ════ POMODORO TIMER ════
const CIRC=678.6;
function timerFmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function updateTimerDisplay(){
  document.getElementById('timer-display').textContent=timerFmt(timerSecondsLeft);
  const prog=document.getElementById('timer-prog');
  const frac=timerTotalSeconds>0?timerSecondsLeft/timerTotalSeconds:1;
  prog.style.strokeDashoffset=(1-frac)*CIRC;
}
function setTimerMode(mins){
  timerMins=mins;
  if(timerRunning){clearInterval(timerInterval);timerInterval=null;timerRunning=false;document.getElementById('timer-start').textContent='Start';document.getElementById('timer-start').className='timer-btn start';}
  timerSecondsLeft=mins*60;timerTotalSeconds=mins*60;
  document.getElementById('timer-label').textContent=mins<=5?'Break time':mins<=15?'Short break':'Focus time';
  document.getElementById('timer-display').textContent=timerFmt(timerSecondsLeft);
  document.querySelectorAll('.timer-mode-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.mins)===mins));
  updateTimerDisplay();
}
document.querySelectorAll('.timer-mode-btn').forEach(b=>b.addEventListener('click',()=>setTimerMode(parseInt(b.dataset.mins))));
document.getElementById('timer-reset').onclick=()=>setTimerMode(timerMins);
document.getElementById('timer-start').onclick=()=>{
  if(timerRunning){
    clearInterval(timerInterval);timerInterval=null;timerRunning=false;
    document.getElementById('timer-start').textContent='Resume';document.getElementById('timer-start').className='timer-btn start';
  }else{
    if(timerSecondsLeft<=0)setTimerMode(timerMins);
    timerRunning=true;
    document.getElementById('timer-start').textContent='Pause';document.getElementById('timer-start').className='timer-btn stop';
    timerInterval=setInterval(()=>{
      timerSecondsLeft--;updateTimerDisplay();
      if(timerSecondsLeft<=0){
        clearInterval(timerInterval);timerInterval=null;timerRunning=false;
        document.getElementById('timer-start').textContent='Start';document.getElementById('timer-start').className='timer-btn start';
        // count session
        const td=todayStr();
        if(timerSessions.date!==td){timerSessions={date:td,count:0};}
        timerSessions.count++;store('hw_timer_sessions_today',timerSessions);
        document.getElementById('timer-sessions').textContent=timerSessions.date===td?timerSessions.count:0;
        showToast('🎉 Session complete!');
        // browser notification if permitted
        if(Notification&&Notification.permission==='granted'){new Notification('SchoolBase — Session complete!',{body:timerMins<=5?'Break over! Back to work.':'Great focus session! Take a break.',icon:''});}
      }
    },1000);
  }
};
function populateTimerTasks(){
  const sel=document.getElementById('timer-task-sel');
  sel.innerHTML='<option value="">— Link to a task (optional) —</option>'+tasks.filter(t=>!t.done).map(t=>`<option value="${t.id}">${escH(t.title)}</option>`).join('');
}
// request notification permission when visiting timer
function onTimerTabOpen(){
  if(Notification&&Notification.permission==='default'){Notification.requestPermission();}
  const td=todayStr();
  document.getElementById('timer-sessions').textContent=timerSessions.date===td?timerSessions.count:0;
}
setTimerMode(25);

// ════ MODALS ════
function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-bg"><div class="modal">${html}</div></div>`;document.querySelector('.modal-bg').addEventListener('click',e=>{if(e.target.classList.contains('modal-bg'))closeModal();});}
function closeModal(){document.getElementById('modal-container').innerHTML='';}

// ════ TABS ════
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const hp=document.getElementById('hw-panel'),cp=document.getElementById('cal-panel'),ap=document.getElementById('avg-panel'),tp=document.getElementById('timer-panel');
  hp.style.display='none';cp.classList.remove('visible');ap.classList.remove('visible');tp.classList.remove('visible');
  if(tab==='calendar'){cp.classList.add('visible');renderCalendar();}
  else if(tab==='averages'){ap.classList.add('visible');renderAverages();}
  else if(tab==='timer'){tp.classList.add('visible');populateTimerTasks();onTimerTabOpen();}
  else{hp.style.display='flex';renderContent();}
}
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));

// ════ SEARCH ════
document.getElementById('search-input').addEventListener('input',e=>{searchQ=e.target.value.trim();if(activeTab!=='calendar'&&activeTab!=='averages'&&activeTab!=='timer')renderContent();});

// ════ MOBILE ════
document.getElementById('mob-sidebar-btn').onclick=()=>{document.getElementById('sidebar').classList.toggle('mob-open');document.getElementById('sidebar-overlay').classList.toggle('show');};
document.getElementById('sidebar-overlay').onclick=()=>{document.getElementById('sidebar').classList.remove('mob-open');document.getElementById('sidebar-overlay').classList.remove('show');};

// ════ WIRES ════
document.getElementById('add-subj-btn').onclick=openAddSubjectModal;
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDrawer();closeModal();}});

// ════ RENDER ALL ════
function renderAll(){renderSidebar();if(activeTab==='calendar')renderCalendar();else if(activeTab==='averages')renderAverages();else if(activeTab==='timer'){populateTimerTasks();}else renderContent();}

// ════ BOOT ════
renderAll();
checkNotifications();
</script>
